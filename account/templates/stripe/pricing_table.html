<script>
    function selectTab(tabId) {
        const monthlyTab = document.getElementById('1-month-tab');
        const yearlyTab = document.getElementById('1-year-tab');
        const monthlyPanel = document.getElementById('1-month-container');
        const yearlyPanel = document.getElementById('1-year-container');
        const monthlyButton = document.getElementById('1-month-tab-button');
        const yearlyButton = document.getElementById('1-year-tab-button');
        const oneTimeButton = document.getElementById('one-time-button');
        const oneTimeTab = document.getElementById('one-time-tab');
        const oneTimePanel = document.getElementById('one-time-container');
        const overlay = document.getElementById('overlay');

        if (tabId === '1-month-tab') {
            monthlyTab.classList.add('Tabs-TabListItemContainer--is-selected');
            yearlyTab.classList.remove('Tabs-TabListItemContainer--is-selected');
            monthlyButton.classList.add('Tabs-TabListItem--is-selected');
            yearlyButton.classList.remove('Tabs-TabListItem--is-selected');
            oneTimeButton.classList.remove('Tabs-TabListItem--is-selected');
            oneTimeTab.classList.remove('Tabs-TabListItemContainer--is-selected');
            monthlyPanel.style.display = 'grid';
            yearlyPanel.style.display = 'none';
            oneTimePanel.style.display = 'none';
            overlay.style.setProperty('--offset', '2px');
            overlay.style.width = '117px';
        } else if (tabId === '1-year-tab') {
            yearlyTab.classList.add('Tabs-TabListItemContainer--is-selected');
            monthlyTab.classList.remove('Tabs-TabListItemContainer--is-selected');
            yearlyButton.classList.add('Tabs-TabListItem--is-selected');
            monthlyButton.classList.remove('Tabs-TabListItem--is-selected');
            oneTimeButton.classList.remove('Tabs-TabListItem--is-selected');
            oneTimeTab.classList.remove('Tabs-TabListItemContainer--is-selected');
            yearlyPanel.style.display = 'grid';
            monthlyPanel.style.display = 'none';
            oneTimePanel.style.display = 'none';
            overlay.style.setProperty('--offset', '121px');
            overlay.style.width = '102px';
        } else if (tabId === 'one-time-tab') {
            oneTimeTab.classList.add('Tabs-TabListItemContainer--is-selected');
            monthlyTab.classList.remove('Tabs-TabListItemContainer--is-selected');
            yearlyTab.classList.remove('Tabs-TabListItemContainer--is-selected');
            oneTimeButton.classList.add('Tabs-TabListItem--is-selected');
            monthlyButton.classList.remove('Tabs-TabListItem--is-selected');
            yearlyButton.classList.remove('Tabs-TabListItem--is-selected');
            oneTimePanel.style.display = 'grid';
            monthlyPanel.style.display = 'none';
            yearlyPanel.style.display = 'none';
            overlay.style.setProperty('--offset', '223px');
            overlay.style.width = '126px';
        }
    }
</script>

            form.submit();
