{% extends 'adminbase.html' %}

{% block title %}Users Management{% endblock %}

{% block content %}
<form method="post" action="{% url 'update-user' user.id %}">
    <label for="username">Username</label>
    <input type="text" name="username" value="{{ user.username }}"><br>
    <label for="email">Email</label>
    <input type="text" name="email" value="{{ user.email }}"><br>
    <label for="join_date">Join Date</label>
    <input type="text" name="join_date" value="{{ user.join_date }}" readonly><br>
    <label for="banned">Banned</label>
    <input type="checkbox" name="banned" value="on" {% if user.banned %}checked{% endif %}><br>
    <label for="badges">Badges</label>
    <select name="badges" multiple>
        {% for badge in badges %}
            <option value="{{ badge.id }}" {% if badge in user.badges.all %}selected{% endif %}>{{ badge.badge_name }}</option>
        {% endfor %}
    </select>
    <small>Hold <strong>Ctrl</strong> (or <strong>Cmd</strong> on Mac) to select multiple badges</small>
    <input type="submit" value="Update">
    {% csrf_token %}
</form>

{% if request.user.is_superuser %}
<style>
.loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

.spinner {
    width: 64px;
    height: 64px;
    border: 6px solid #ccc;
    border-top-color: #46738e; /* your dark main colour */
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>
<script>
function showLoading(form) {
    document.getElementById("loadingOverlay").style.display = "flex";
    const btn = form.querySelector("button");
    if (btn) {
        btn.disabled = true;
        btn.textContent = "Processing…";
    }
}
</script>
<style>
/* Minimal admin polish */
form {
    max-width: 420px;
}

label {
    display: block;
    margin-top: 10px;
    font-weight: 500;
}

input[type="text"],
select {
    width: 100%;
    padding: 6px 8px;
    margin-top: 4px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

input[readonly] {
    background: #f5f5f5;
}

input[type="checkbox"] {
    margin-right: 6px;
}

small {
    display: block;
    margin: 6px 0 12px;
    color: #666;
}

button,
input[type="submit"] {
    margin-top: 12px;
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    background: #46738e;
    color: #fff;
    cursor: pointer;
}

button:hover,
input[type="submit"]:hover {
    background: #3b627a;
}

hr {
    margin: 24px 0;
    border: none;
    border-top: 1px solid #ddd;
}
</style>

<hr>

<form method="post"
      action="{% url 'gdpr-export-download' user.id %}"
      onsubmit="showLoading(this)">
    {% csrf_token %}
    <button type="submit">Download FOIR / GDPR Data</button>
</form>

<form method="post"
      action="{% url 'gdpr-export-email' user.id %}"
      onsubmit="showLoading(this)">
    {% csrf_token %}
    <button type="submit">Email FOIR / GDPR Data</button>
</form>
{% endif %}
{% endblock %}
