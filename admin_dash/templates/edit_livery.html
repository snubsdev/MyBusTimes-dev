{% extends 'adminbase.html' %}

{% block content %}
<style>
    .livery-cell-zoom {
        transform: scale(5);
        transform-origin: top left;
        display: inline-block;
    }

    .vehicle-marker {
        text-align: center;
        color: #000;
        fill: currentColor;
        text-anchor: middle;
        paint-order: stroke;
        stroke-width: 2px;
        line-height: 16px;
        z-index: 20;
    }

    p {
        display: inline-grid;
        width: calc(100% - 15px);
        text-align: left;
    }

    .round-livery-cell {
        border-radius: 50%;
        width: 2.25em;
        height: 2.25em;
        border: 3px solid black;
    }

    input[type="checkbox"] {
        width: 20px;
    }
</style>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <div style="margin-top: 10px;">
        <label for="id_left_css">Left Color Preview:</label><br>
        <div id="simple-preview" class="round-livery-cell" style="background: {{ form.instance.colour }}"></div><br>
        <div class="livery-cell-zoom">
            <svg id="left-preview" width="48" height="32" class="vehicle-marker" style="stroke: {{ form.instance.stroke_colour }}; text-align: center; background: {{ form.instance.left_css }}; border: 1px solid rgba(0,0,0); color: {{ form.instance.text_colour }}; fill: {{ form.instance.text_colour }}; stroke-width: 2px; ">
                <text x="22" y="22">888</text>
            </svg>
        </div>
        <br>
        <div class="livery-cell-zoom">
            <svg id="right-preview" width="48" height="32" class="vehicle-marker" style="stroke: {{ form.instance.stroke_colour }}; text-align: center; background: {{ form.instance.right_css }}; border: 1px solid rgba(0,0,0); color: {{ form.instance.text_colour }}; fill: {{ form.instance.text_colour }}; stroke-width: 2px; ">
                <text x="22" y="22">888</text>
            </svg>
        </div>
    </div>

    <br>

    <button type="submit" class="btn btn-primary">Save</button>
</form>


<script>
    function updatePreviewFromElement(el) {
        if (!el) return;
        const id = el.id;
        const val = el.value || '';

        const left = document.getElementById('left-preview');
        const right = document.getElementById('right-preview');

        if (id === 'id_left_css' && left) {
            left.style.background = val;
        } else if (id === 'id_right_css' && right) {
            right.style.background = val;
        } else if (id === 'id_text_colour') {
            [left, right].forEach(svg => {
                if (!svg) return;
                svg.setAttribute('fill', val);
                svg.style.color = val;
                const t = svg.querySelector('text');
                if (t) t.setAttribute('fill', val);
            });
        } else if (id === 'id_stroke_colour') {
            [left, right].forEach(svg => {
                if (!svg) return;
                svg.setAttribute('stroke', val || 'none');
                svg.setAttribute('stroke-width', val ? '2' : '0');
                const t = svg.querySelector('text');
                if (t) {
                    t.setAttribute('stroke', val || 'none');
                    t.setAttribute('stroke-width', val ? '2' : '0');
                }
            });
        } else if (id === 'id_colour') {
            const simple = document.getElementById('simple-preview');
            if (simple) simple.style.background = val;
        }
    }

    // Attach listeners to inputs so preview updates live
    document.addEventListener('DOMContentLoaded', function() {
        const ids = ['id_left_css', 'id_right_css', 'id_text_colour', 'id_stroke_colour', 'id_colour'];
        ids.forEach(i => {
            const el = document.getElementById(i);
            if (el) {
                el.addEventListener('input', function() { updatePreviewFromElement(el); });
                // initialize from current DOM value
                updatePreviewFromElement(el);
            }
        });
    });
</script>

{% endblock %}
