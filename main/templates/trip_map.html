{% extends 'mbtbase.html' %}
{% load static %}
{% load url_filters %}

{% block title %}{{ route.route_num }} Route Map{% endblock %}
{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />

<style>

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />

<style>
  html, body, main {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  #directionToggle {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  #stopsToggle {
    position: fixed;
    bottom: 50px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  .vehicle-marker {
    text-align: center;
    color: #000;
    fill: currentColor;
    text-anchor: middle;
    paint-order: stroke;
    stroke-width: 2px;
    line-height: 16px;
    z-index: 20;
  }

  .maplibregl-popup-tip,
  .maplibregl-popup-content {
    background: var(--background-color) !important;
    color: var(--text-color) !important;
    border-radius: 0.5em !important;
    font-size: 12px !important;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<button id="directionToggle" style="display: none;">
  {% if direction == "inbound" %}
    Show Outbound
  {% else %}
    Show Inbound
  {% endif %}
</button>

<div id="map"></div>

<script>
const tripId = "{{ trip.trip_id }}";   // current trip ID
const operatorId = "{{ operator.id }}";
let currentDirection = "inbound";
let showStops = false;

{% if themeDark == 'True' %}
  tilesJSON = 'https://tiles.snubs.dev/styles/dark/style.json';
{% else %}
  tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';
{% endif %}

const map = new maplibregl.Map({
  container: 'map',
  style: tilesJSON,
  center: [-1.9, 54.9],
  zoom: 8
});
map.addControl(new maplibregl.NavigationControl(), 'top-left');

const routeLayers = [];
let stopMarkers = [];
let btMarkers = [];

// … keep your loadOperatorRoutes and addRoutePolyline functions unchanged …

function createLiveryIcon({ label = '', rotation = 0, css = null, textColour = '#fff', textStroke = "#000", strokeWidth = "0px" } = {}) {
  const html = document.createElement('div');
  html.innerHTML = `
    <div style="display:inline-block; transform: rotate(${rotation}deg);">
      <svg width="24" height="16" class="vehicle-marker"
           style="stroke:${textStroke}; ${css ? `background:${css};` : ''} border:1px solid rgba(0,0,0);
                  color:${textColour}; fill:${textColour}; stroke-width:${strokeWidth};">
        <text x="12" y="12">${label}</text>
      </svg>
    </div>`;
  return html;
}

async function loadTripVehicle() {
  const b = map.getBounds();
  const q = new URLSearchParams({
    ymax: b.getNorth(),
    ymin: b.getSouth(),
    xmax: b.getEast(),
    xmin: b.getWest(),
    operator_id: operatorId
  });

  const url = `/api/trips/estimated_positions/?${q}&limit=5000`;
  const res = await fetch(url);
  const data = await res.json();
  const vehicles = Array.isArray(data.results) ? data.results : [];

  btMarkers.forEach(m => m.remove());
  btMarkers = [];

  // only show the vehicle for this trip
  const v = vehicles.find(v => v.trip_id === parseInt(tripId));
  if (!v) return;

  const lat = v.lat, lng = v.lng;
  if (!lat || !lng) return;

  let heading = (v.heading ?? 0) + 180;
  const line = v.service?.line_name || "";
  const dest = v.destination || "";
  const serviceLink = v.service?.url || "";
  const vehicleLink = v.vehicle?.url || "";
  const vehicleName = v.vehicle?.name || "";

  const css = v.vehicle?.css || v.vehicle?.left_css || "#fff";
  const textColour = v.vehicle?.text_colour || (v.vehicle?.white_text ? "#fff" : "#000");
  const textStroke = v.vehicle?.stroke_colour || "#000";
  const strokeWidth = v.vehicle?.stroke_colour ? "2px" : "0px";
  heading = heading + 90;

  const el = createLiveryIcon({
    label: line || vehicleName,
    css,
    textColour,
    rotation: heading,
    textStroke,
    strokeWidth
  });

  const m = new maplibregl.Marker({ element: el })
    .setLngLat([lng, lat])
    .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`
      <a href="${serviceLink}">${line} to ${dest}</a><br>
      ${vehicleLink ? `<a href="${vehicleLink}">${vehicleName}</a><br>` : ""}
      <span>Simulated Location</span>
    `))
    .addTo(map);

  btMarkers.push(m);
}

// initialise
(async () => {
  await loadOperatorRoutes();
  await loadTripVehicle();
})();

map.on("moveend", loadTripVehicle);
setInterval(loadTripVehicle, 30000);

document.getElementById("directionToggle").addEventListener("click", async () => {
  currentDirection = currentDirection === "inbound" ? "outbound" : "inbound";
  document.getElementById("directionToggle").innerText =
    currentDirection === "inbound" ? "Show Outbound" : "Show Inbound";
  await loadOperatorRoutes();
  await loadTripVehicle();
});

document.getElementById("stopsToggle").addEventListener("click", async () => {
  showStops = !showStops;
  document.getElementById("stopsToggle").innerText = showStops ? "Hide Stops" : "Show Stops";
  await loadOperatorRoutes();
});
</script>
{% endblock %}
