{% extends 'mbtbase.html' %}
{% load static %}
{% load url_filters %}

{% block title %}{{ route.route_num }} Route Map{% endblock %}
{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />

<style>
  html, body, main {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  #directionToggle {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<button id="directionToggle" style="display: none;">
  {% if direction == "inbound" %}
    Show Outbound
  {% else %}
    Show Inbound
  {% endif %}
</button>


<div id="map"></div>
<script>
  const routeId = {{ route_id }};
  const operatorName = "{{ operator.operator_name }}";
  let currentDirection = "{{ direction }}";

  const trackingPoints = {{ tracking_points|safe }};
  console.log("Tracking Points:", trackingPoints);

  // Choose tile style (dark/light theme)
  {% if themeDark == 'True' %}
    const tilesJSON = 'https://tiles.snubs.dev/styles/dark/style.json';
  {% else %}
    const tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';
  {% endif %}

  // Initialize MapLibre map
  const map = new maplibregl.Map({
    container: 'map',
    style: tilesJSON,
    center: [-1.9, 54.9],
    zoom: 6
  });
  map.addControl(new maplibregl.NavigationControl(), 'top-left');

  let markers = [];
  const routeLayerId = 'routeLine';
  const trackingLayerId = 'trackingLine';

  async function loadRoute(direction) {
    // Clear markers
    for (const m of markers) m.remove();
    markers = [];

    // Remove previous route line
    if (map.getLayer(routeLayerId)) map.removeLayer(routeLayerId);
    if (map.getSource(routeLayerId)) map.removeSource(routeLayerId);

    if (routeId) {
      const response = await fetch(`/api/routes/${routeId}/stops/?direction=${direction}`);
      if (!response.ok) {
        alert("Failed to load route stops");
        return;
      }

      const stops = await response.json();
      const latlngs = stops.map(stop => stop.cords.split(',').map(Number))
                           .map(([lat, lon]) => [lon, lat]); // MapLibre expects [lon,lat]

      if (latlngs.length >= 2) {
        map.addSource(routeLayerId, {
          type: 'geojson',
          data: {
            type: 'Feature',
            geometry: { type: 'LineString', coordinates: latlngs }
          }
        });

        map.addLayer({
          id: routeLayerId,
          type: 'line',
          source: routeLayerId,
          paint: { 'line-color': '#2f80ed', 'line-width': 3 }
        });

        const bounds = new maplibregl.LngLatBounds();
        latlngs.forEach(c => bounds.extend(c));
        map.fitBounds(bounds, { padding: 60 });
      }

      // Add stop markers
      for (const stop of stops) {
        const [lat, lon] = stop.cords.split(',').map(Number);
        if (isNaN(lat) || isNaN(lon)) continue;

        const el = document.createElement('div');
        el.style.cssText = `
          width:10px;height:10px;
          border:3px solid #2f80ea;
          border-radius:50%;
          background:#fff;
          cursor:pointer;
        `;

        const marker = new maplibregl.Marker({ element: el })
          .setLngLat([lon, lat])
          .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(
            `<a href="/stop/?name=${encodeURIComponent(stop.stop)}">${stop.stop}</a>`
          ))
          .addTo(map);

        markers.push(marker);
      }
    }
  }

  function plotTracking() {
    if (!trackingPoints.length) return;

    const coords = trackingPoints.map(p => [p.X, p.Y]);

    if (map.getLayer(trackingLayerId)) map.removeLayer(trackingLayerId);
    if (map.getSource(trackingLayerId)) map.removeSource(trackingLayerId);

    map.addSource(trackingLayerId, {
      type: 'geojson',
      data: {
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: coords }
      }
    });

    map.addLayer({
      id: trackingLayerId,
      type: 'line',
      source: trackingLayerId,
      paint: {
        'line-color': 'black',
        'line-width': 3,
        'line-dasharray': [4, 7]
      }
    });

    // Optional: Add current location marker at the last point
    const last = coords[coords.length - 1];
    if (last) {
      const heading = trackingPoints[trackingPoints.length - 1].heading || 0;
      const el = document.createElement('img');
      el.src = '{% static "icons/bus-arrow.svg" %}';
      el.style.width = '32px';
      el.style.height = '32px';
      el.style.transform = `rotate(${heading}deg)`;

      new maplibregl.Marker({ element: el })
        .setLngLat(last)
        .addTo(map);
    }
  }

  // Toggle button logic
  const toggleBtn = document.getElementById('directionToggle');
  toggleBtn.addEventListener('click', () => {
    if (currentDirection === 'inbound') {
      currentDirection = 'outbound';
      toggleBtn.textContent = 'Show Inbound';
    } else {
      currentDirection = 'inbound';
      toggleBtn.textContent = 'Show Outbound';
    }
    loadRoute(currentDirection);
  });

  // Initial load
  loadRoute(currentDirection);
  plotTracking();
</script>

{% endblock %}
