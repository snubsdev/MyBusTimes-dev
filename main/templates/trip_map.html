{% extends 'mbtbase.html' %}
{% load static %}
{% load url_filters %}

{% block title %}{{ route.route_num }} Route Map{% endblock %}
{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />

<style>
  html, body, main {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  #directionToggle {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<button id="directionToggle" style="display: none;">
  {% if direction == "inbound" %}
    Show Outbound
  {% else %}
    Show Inbound
  {% endif %}
</button>

<div id="map"></div>

<script>
const tripId = "{{ trip.trip_id }}";
const operatorId = "{{ operator.id }}";
let currentDirection = "inbound";
let showStops = false;

{% if themeDark == 'True' %}
  const tilesJSON = 'https://tiles.snubs.dev/styles/dark/style.json';
{% else %}
  const tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';
{% endif %}

const map = new maplibregl.Map({
  container: 'map',
  style: tilesJSON,
  center: [-1.9, 54.9],
  zoom: 8
});
map.addControl(new maplibregl.NavigationControl(), 'top-left');

const routeLayers = [];
let stopMarkers = [];
let btMarkers = [];

async function loadOperatorRoutes() {
  for (const id of routeLayers) {
    if (map.getLayer(id)) map.removeLayer(id);
    if (map.getSource(id)) map.removeSource(id);
  }
  routeLayers.length = 0;
  stopMarkers.forEach(m => m.remove());
  stopMarkers = [];

  const routesRes = await fetch(`/api/operator/route/?route_operators=${operatorId}&stops_have_cords=true`);
  const routesData = await routesRes.json();
  const routes = routesData.results ?? [];
  const bounds = new maplibregl.LngLatBounds();

  for (const r of routes) {
    await addRoutePolyline(r.id, bounds);
  }
  if (!bounds.isEmpty()) map.fitBounds(bounds, { padding: 60 });
}

async function addRoutePolyline(routeId, bounds) {
  const res = await fetch(`/api/routes/${routeId}/stops/?direction=${currentDirection}`);
  if (!res.ok) return;
  const stops = await res.json();
  const coords = stops.map(s => s.cords?.split(',').map(Number))
                      .filter(c => c && c.length === 2)
                      .map(([lat, lon]) => [lon, lat]);
  const lid = `route_${routeId}`;
  if (coords.length >= 2) {
    map.addSource(lid, { type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } } });
    map.addLayer({ id: lid, type: 'line', source: lid,
      paint: { 'line-color': '#2f80ed', 'line-width': 3 } });
    routeLayers.push(lid);
    coords.forEach(c => bounds.extend(c));
  }
  if (showStops) {
    for (const stop of stops) {
      const [lat, lon] = stop.cords.split(',').map(Number);
      const el = document.createElement('div');
      el.style.cssText = "width:10px;height:10px;border:3px solid #2f80ea;border-radius:50%;background:#fff;";
      const m = new maplibregl.Marker({ element: el })
        .setLngLat([lon, lat])
        .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(
          `<a href="/stop/?name=${encodeURIComponent(stop.stop)}">${stop.stop}</a>`))
        .addTo(map);
      stopMarkers.push(m);
    }
  }
}

function createLiveryIcon({ label = '', rotation = 0, css = null, textColour = '#fff', textStroke = "#000", strokeWidth = "0px" } = {}) {
  const html = document.createElement('div');
  html.innerHTML = `
    <div style="display:inline-block; transform: rotate(${rotation}deg);">
      <svg width="24" height="16" class="vehicle-marker"
           style="stroke:${textStroke}; ${css ? `background:${css};` : ''} border:1px solid rgba(0,0,0);
                  color:${textColour}; fill:${textColour}; stroke-width:${strokeWidth};">
        <text x="12" y="12">${label}</text>
      </svg>
      <span style="display:flex; margin-top:-27px; margin-left:16px; color:black;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 6.65v10.69c0 .64.76.99 1.24.56l6.11-5.35c.34-.3.34-.83 0-1.13L9.24 6.07C8.76 5.65 8 5.99 8 6.63Z" />
        </svg>
      </span>
    </div>`;
  return html;
}

async function fetchTripVehicle() {
  const b = map.getBounds();
  const q = new URLSearchParams({
    ymax: b.getNorth(), ymin: b.getSouth(),
    xmax: b.getEast(), xmin: b.getWest(),
    operator_id: operatorId
  }).toString();

  try {
    const res = await fetch(`/api/trips/estimated_positions/?${q}&limit=5000`);
    const data = await res.json();
    let vehicles = Array.isArray(data.results) ? data.results : (data.features || []);
    btMarkers.forEach(m => m.remove());
    btMarkers = [];

    // only show the vehicle for this trip
    const v = vehicles.find(v => v.trip_id === parseInt(tripId));
    if (!v) return;

    const lng = v.lng, lat = v.lat;
    if (!lng || !lat) return;

    let heading = v.heading ?? 0;
    heading = heading + 180;
    let rotation = heading;
    heading = heading + 90;

    const line = v.service?.line_name || '';
    const serviceLink = v.service?.url || '';
    const vehicleLink = v.vehicle?.url || '';
    const dest = v.destination || '';
    const vehicleName = v.vehicle?.name || '';
    const whiteText = v.vehicle?.white_text ?? false;
    let textStroke = v.vehicle?.stroke_colour ?? false;
    const livery = v.vehicle?.livery || null;

    const left_css = v.vehicle?.left_css || null;
    const right_css = v.vehicle?.right_css || null;
    let css = (rotation > 180 && rotation < 360) ? right_css : left_css;

    let textColour = whiteText ? '#fff' : '#000';
    if (v.vehicle?.text_colour) textColour = v.vehicle.text_colour;
    let strokeWidth = textStroke ? "2px" : "0px";

    if (livery == null) {
      textColour = '#000';
      css = "#fff";
    }
    if (v.vehicle?.css) {
      css = v.vehicle.css;
    }

    const html = `
      <a href="${serviceLink}">${line} to ${dest}</a><br>
      ${vehicleName ? `<a href="${vehicleLink}">${vehicleName}</a><br>` : ''}
      <span>Simulated Location</span>
    `;

    const el = createLiveryIcon({
      label: line || vehicleName,
      css,
      textColour,
      rotation: heading,
      textStroke,
      strokeWidth
    });

    const m = new maplibregl.Marker({ element: el })
      .setLngLat([lng, lat])
      .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(html))
      .addTo(map);

    btMarkers.push(m);
  } catch (e) {
    console.error('Trip vehicle fetch failed', e);
  }
}

document.getElementById("directionToggle").addEventListener("click", async () => {
  currentDirection = currentDirection === "inbound" ? "outbound" : "inbound";
  document.getElementById("directionToggle").innerText =
    currentDirection === "inbound" ? "Show Outbound" : "Show Inbound";
  await loadOperatorRoutes();
  await fetchTripVehicle();
});

document.getElementById("stopsToggle").addEventListener("click", async () => {
  showStops = !showStops;
  document.getElementById("stopsToggle").innerText = showStops ? "Hide Stops" : "Show Stops";
  await loadOperatorRoutes();
});

(async () => {
  await loadOperatorRoutes();
  await fetchTripVehicle();
})();

map.on("moveend", fetchTripVehicle);
setInterval(fetchTripVehicle, 30000);

</script>
{% endblock %}
