{% extends 'mbtbase.html' %}
{% load static %}
{% load url_filters %}

{% block title %}Trip Map{% endblock %}
{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  html, body, main {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  #directionToggle {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  #stopsToggle {
    position: fixed;
    bottom: 50px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  .vehicle-marker {
    text-align: center;
    color: #000;
    fill: currentColor;
    text-anchor: middle;
    paint-order: stroke;
    stroke-width: 2px;
    line-height: 16px;
    z-index: 20;
  }

  .maplibregl-popup-tip,
  .maplibregl-popup-content {
    background: var(--background-color) !important;
    color: var(--text-color) !important;
    border-radius: 0.5em !important;
    font-size: 12px !important;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<button id="directionToggle" style="display:none;">Toggle Direction</button>
<div id="map"></div>

<script>
  const savedView = JSON.parse(localStorage.getItem('mbt_map_view') || 'null');
  const tripId = "{{ trip.trip_id }}";   // ensure string interpolation
  const vehicleId = "{{ trip.trip_vehicle.id|default:'' }}";
  let btMarkers = [];
  let btVehicleData = []; // Store vehicle data to re-render on zoom change
  const DETAIL_ZOOM_THRESHOLD = 12; // Zoom level to switch between circle and full icon
  let currentDirection = "inbound";

  // Choose tile style
  {% if themeDark == 'True' %}
    const tilesJSON = 'https://tiles.snubs.dev/styles/dark/style.json';
  {% else %}
    const tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';
  {% endif %}

  const map = new maplibregl.Map({
    container: 'map',
    style: tilesJSON,
    center: savedView?.center || [-2.5, 54.5],
    zoom: savedView?.zoom || 5,
    dragRotate: false
  });

  map.on('style.load', () => {
    map.setProjection({
      type: 'globe'
    });
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-left');

  function createLiveryIcon({ label = '', rotation = 0, bg = '#0000', css = null, textColour = '#fff', textStroke = "#0000", strokeWidth = "0px", carriages = 1 } = {}) {
      const normalisedRotation = ((rotation % 360) + 360) % 360;
      const cellRotation = (normalisedRotation < 90 || normalisedRotation > 270) ? 0 : 180;
      const backgroundStyle = css ? `background: ${css};` : `background: ${bg};`;
      const html = document.createElement('div');
      
      // Ensure carriages is at least 1
      const numCarriages = Math.max(1, parseInt(carriages) || 1);
      
      // Build carriage SVGs - last carriage (front) has label, rest are empty
      let carriageSvgs = '';
      for (let i = 0; i < numCarriages; i++) {
        const isLastCarriage = i === numCarriages - 1;
        const carriageLabel = isLastCarriage ? label : '';
        carriageSvgs += `
          <svg width="24" height="16" class="vehicle-marker" style="stroke: ${textStroke}; text-align: center; ${backgroundStyle} transform: rotate(${cellRotation}deg); border: 1px solid rgba(0,0,0); color: ${textColour}; fill: ${textColour}; stroke-width: ${strokeWidth}; ${i > 0 ? 'margin-left: 3px;' : ''}">
            <text x="12" y="12">${carriageLabel}</text>
          </svg>
        `;
      }
      
      html.innerHTML = `
        <div style="display:inline-flex; transform: rotate(${rotation}deg); align-items: center;">
          ${carriageSvgs}
          <span style="display:flex; margin-left: -8px; color:black;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 6.65v10.69c0 .64.76.99 1.24.56l6.11-5.35c.34-.3.34-.83 0-1.13L9.24 6.07C8.76 5.65 8 5.99 8 6.63Z" />
            </svg>
          </span>
        </div>
      `;

      return html;
    }

  function createSimpleCircle({ colour = '#000', borderColour = '#000' } = {}) {
    const el = document.createElement('div');
    el.style.cssText = `width: 12px; height: 12px; background: ${colour}; border: 2px solid ${borderColour}; border-radius: 50%;`;
    return el;
  }

  async function loadOperatorBT() {
    const b = map.getBounds();

    const q = new URLSearchParams({
      ymax: b.getNorth(),
      ymin: b.getSouth(),
      xmax: b.getEast(),
      xmin: b.getWest(),
      vehicle_id: vehicleId,
    });

    const url = `/api/trips/simulated_positions/?${q}&limit=5000`;

    const res = await fetch(url);
    const data = await res.json();
    btVehicleData = Array.isArray(data.results) ? data.results : [];

    renderBTMarkers();
  }

  function renderBTMarkers() {
    btMarkers.forEach(m => m.remove());
    btMarkers = [];

    const zoom = map.getZoom();
    const showDetailedIcon = zoom >= DETAIL_ZOOM_THRESHOLD;

    for (const v of btVehicleData) {
      const lat = v.lat;
      const lng = v.lng;
      if (!lat || !lng) continue;

      let heading = (v.heading ?? 0) + 180;
      const line = v.service?.line_name || "";
      const dest = v.destination || "";
      const serviceLink = v.service?.url || "";
      const vehicleLink = v.vehicle?.url || "";
      const vehicleColour = v.vehicle?.colour || '#000';

      // livery logic (copied from your working page)
      const css = v.vehicle?.css || v.vehicle?.left_css || "#fff";
      let textColour = v.vehicle?.text_colour || (v.vehicle?.white_text ? "#fff" : "#000");
      const textStroke = v.vehicle?.stroke_colour ?? false;
      const strokeWidth = textStroke ? "2px" : "0px";
      const livery = v.vehicle?.livery || null;
      
      if (livery == null) {
        textColour = '#000';
      }
      
      heading = heading + 90;

      // Parse custom_features for carriages
      let carriages = 1;
      const customFeatures = v.vehicle?.custom_features;
      if (customFeatures) {
        try {
          let features = customFeatures;
          if (typeof customFeatures === 'string') {
            // Try parsing as-is first (in case it's already valid JSON)
            try {
              features = JSON.parse(customFeatures);
            } catch {
              // Fallback: only replace quotes if it looks like Python dict notation
              // This is still fragile but slightly better
              features = JSON.parse(customFeatures.replace(/'/g, '"'));
            }
          }
          if (features && features.carriages) {
            carriages = parseInt(features.carriages) || 1;
          }
        } catch (e) {
          console.warn('Failed to parse custom_features:', customFeatures, e);
        }
      }

      let el;
      if (showDetailedIcon) {
        el = createLiveryIcon({
          label: line,
          css,
          textColour,
          rotation: heading,
          textStroke,
          strokeWidth,
          carriages
        });
      } else {
        el = createSimpleCircle({ colour: vehicleColour, borderColour: '#333' });
      }

      const veh = v.vehicle || {};

      const m = new maplibregl.Marker({ element: el })
        .setLngLat([lng, lat])
        .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`
          <a href="${serviceLink}">${line} to ${dest}</a><br>
          ${vehicleLink ? `<a href="${vehicleLink}">${veh.name || ''}</a>` : ""}<br>
          <span class="time-ago" data-time="${v.updated_at}">${timeAgo(v.updated_at)}</span>
          <small style="margin-bottom: 0;">Simulated Location</small>
        `))
        .addTo(map);

      btMarkers.push(m);
    }
  }

  let markers = [];
  const routeLayerId = 'routeLine';

  async function loadTrip(tripId) {
    // Fetch trip data
    const res = await fetch(`/api/trips/${tripId}/`);
    if (!res.ok) {
      alert("Failed to load trip data");
      return;
    }
    const tripData = await res.json();
    console.log("Trip data:", tripData);

    const routeId = tripData.trip_route;   // use trip_route field
    currentDirection = tripData.direction || currentDirection;

    // Fetch route geometry
    const routeRes = await fetch(`/api/routes/${routeId}/stops/?direction=${currentDirection}`);
    if (!routeRes.ok) {
      alert("Failed to load route stops");
      return;
    }
    const data = await routeRes.json();

    // Clear old markers/layers
    for (const m of markers) m.remove();
    markers = [];
    if (map.getLayer(routeLayerId)) map.removeLayer(routeLayerId);
    if (map.getSource(routeLayerId)) map.removeSource(routeLayerId);

    const hasSnapped = data.has_snapped_route === true;
    const stops = data.stops || [];
    const snapped = data.snapped_route || [];

    const stopCoords = stops
      .map(stop => stop.cords?.split(',').map(Number))
      .filter(c => c && c.length === 2 && !isNaN(c[0]) && !isNaN(c[1]))
      .map(([lat, lon]) => [lon, lat]);

    let geometryToDraw = hasSnapped && snapped.length > 1 ? snapped : stopCoords;

    if (geometryToDraw.length >= 2) {
      map.addSource(routeLayerId, {
        type: 'geojson',
        data: { type: 'Feature', geometry: { type: 'LineString', coordinates: geometryToDraw } }
      });
      map.addLayer({
        id: routeLayerId,
        type: 'line',
        source: routeLayerId,
        paint: { 'line-color': '#2f80ed', 'line-width': 3 }
      });
      const bounds = new maplibregl.LngLatBounds();
      geometryToDraw.forEach(c => bounds.extend(c));
      map.fitBounds(bounds, { padding: 60 });
    }

    // Add stop markers
    for (const stop of stops) {
      const [lat, lon] = stop.cords.split(',').map(Number);
      if (isNaN(lat) || isNaN(lon)) continue;
      const el = document.createElement('div');
      el.style.cssText = "width:10px;height:10px;border:3px solid #2f80ea;border-radius:50%;background:#fff;cursor:pointer;";
      new maplibregl.Marker({ element: el })
        .setLngLat([lon, lat])
        .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`<a href="/stop/?name=${encodeURIComponent(stop.stop)}">${stop.stop}</a>`))
        .addTo(map);
    }

    // Optional: if your API provides tracking_points, overlay them here
    if (tripData.tracking_points && tripData.tracking_points.length) {
      const coords = tripData.tracking_points.map(p => [p.X, p.Y]);
      map.addSource('trackingLine', {
        type: 'geojson',
        data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } }
      });
      map.addLayer({
        id: 'trackingLine',
        type: 'line',
        source: 'trackingLine',
        paint: { 'line-color': 'black', 'line-width': 3, 'line-dasharray': [4, 7] }
      });
      const last = coords[coords.length - 1];
      if (last) {
        const heading = tripData.tracking_points[tripData.tracking_points.length - 1].heading || 0;
        const busEl = document.createElement('img');
        busEl.src = '{% static "icons/bus-arrow.svg" %}';
        busEl.style.width = '32px'; busEl.style.height = '32px';
        busEl.style.transform = `rotate(${heading}deg)`;
        new maplibregl.Marker({ element: busEl }).setLngLat(last).addTo(map);
      }
    }
  }

  map.on('load', async () => {
    await loadOperatorBT();
    await loadTrip(tripId);
  });
  map.on("moveend", loadOperatorBT);
setInterval(loadOperatorBT, 30000);

// Re-render BT markers when zooming past the threshold (without re-fetching data)
let lastZoomLevel = map.getZoom();
map.on('zoom', () => {
  const currentZoom = map.getZoom();
  const crossedThreshold = 
    (lastZoomLevel < DETAIL_ZOOM_THRESHOLD && currentZoom >= DETAIL_ZOOM_THRESHOLD) ||
    (lastZoomLevel >= DETAIL_ZOOM_THRESHOLD && currentZoom < DETAIL_ZOOM_THRESHOLD);
  
  if (crossedThreshold && btVehicleData.length > 0) {
    renderBTMarkers();
  }
  lastZoomLevel = currentZoom;
});

function timeAgo(dateString) {
    if (!dateString) return '';
    const seconds = Math.floor((new Date() - new Date(dateString)) / 1000);
    if (seconds < 60) return `${seconds} sec${seconds !== 1 ? 's' : ''} ago`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes} min${minutes !== 1 ? 's' : ''} ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours} hr${hours !== 1 ? 's' : ''} ago`;
    const days = Math.floor(hours / 24);
    return `${days} day${days !== 1 ? 's' : ''} ago`;
  }

setInterval(() => {
    document.querySelectorAll('.time-ago').forEach(el => {
      const dateString = el.dataset.time;
      if (dateString) {
        el.textContent = timeAgo(dateString);
      }
    });
  }, 1000); 
</script>
{% endblock %}
