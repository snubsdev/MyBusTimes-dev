{% extends 'mbtbase.html' %}
{% load static %}
{% load url_filters %}

{% block title %}{{ route.route_num }} Route Map{% endblock %}
{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />

<style>
  html, body, main {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  #directionToggle {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<button id="directionToggle" style="display: none;">
  {% if direction == "inbound" %}
    Show Outbound
  {% else %}
    Show Inbound
  {% endif %}
</button>

<div id="map"></div>

<script>
const tripId = "{{ trip.trip_id }}";
const operatorId = "{{ operator.id }}";
let currentDirection = "inbound";
let showStops = false;
let tripVehicleId = null;

{% if themeDark == 'True' %}
  const tilesJSON = 'https://tiles.snubs.dev/styles/dark/style.json';
{% else %}
  const tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';
{% endif %}

const map = new maplibregl.Map({
  container: 'map',
  style: tilesJSON,
  center: [-1.9, 54.9],
  zoom: 8
});
map.addControl(new maplibregl.NavigationControl(), 'top-left');

const routeLayers = [];
let stopMarkers = [];
let btMarkers = [];

// get trip → vehicle ID
async function getTripVehicle() {
  const res = await fetch(`/api/trips/${tripId}/`);
  if (!res.ok) return;
  const tripData = await res.json();
  tripVehicleId = tripData.trip_vehicle;
  currentDirection = tripData.direction || currentDirection;
}

// draw route
async function addRoutePolyline(routeId, bounds) {
  const res = await fetch(`/api/routes/${routeId}/stops/?direction=${currentDirection}`);
  if (!res.ok) return;
  const stops = await res.json();
  const coords = stops
    .map(s => s.cords?.split(',').map(Number))
    .filter(c => c && c.length === 2)
    .map(([lat, lon]) => [lon, lat]);

  const lid = `route_${routeId}`;
  if (coords.length >= 2) {
    map.addSource(lid, {
      type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } }
    });
    map.addLayer({ id: lid, type: 'line', source: lid, paint: { 'line-color': '#2f80ed','line-width': 3 } });
    routeLayers.push(lid);
    coords.forEach(c => bounds.extend(c));
  }

  if (showStops) {
    for (const stop of stops) {
      const [lat, lon] = stop.cords.split(',').map(Number);
      const el = document.createElement('div');
      el.style.cssText = "width:10px;height:10px;border:3px solid #2f80ea;border-radius:50%;background:#fff;";
      const m = new maplibregl.Marker({ element: el })
        .setLngLat([lon, lat])
        .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`<a href="/stop/?name=${encodeURIComponent(stop.stop)}">${stop.stop}</a>`))
        .addTo(map);
      stopMarkers.push(m);
    }
  }
}

// show only the trip’s vehicle
async function loadTripVehicleMarker() {
  if (!tripVehicleId) return;
  const b = map.getBounds();
  const q = new URLSearchParams({
    ymax: b.getNorth(), ymin: b.getSouth(),
    xmax: b.getEast(), xmin: b.getWest(),
    operator_id: operatorId
  });
  const url = `/api/trips/estimated_positions/?${q}&limit=5000`;
  const res = await fetch(url);
  const data = await res.json();
  const vehicles = Array.isArray(data.results) ? data.results : [];

  btMarkers.forEach(m => m.remove());
  btMarkers = [];

  const v = vehicles.find(v => v.vehicle?.id === tripVehicleId);
  if (!v) return;

  const lat = v.lat, lng = v.lng;
  if (!lat || !lng) return;

  let heading = (v.heading ?? 0) + 270;
  const line = v.service?.line_name || "";
  const dest = v.destination || "";
  const serviceLink = v.service?.url || "";
  const vehicleLink = v.vehicle?.url || "";

  const css = v.vehicle?.css || v.vehicle?.left_css || "#fff";
  const textColour = v.vehicle?.text_colour || (v.vehicle?.white_text ? "#fff" : "#000");
  const textStroke = v.vehicle?.stroke_colour ?? false;
  const strokeWidth = textStroke ? "2px" : "0px";

  const el = createLiveryIcon({ label: line, css, textColour, rotation: heading, textStroke, strokeWidth });
  const m = new maplibregl.Marker({ element: el })
    .setLngLat([lng, lat])
    .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`
      <a href="${serviceLink}">${line} to ${dest}</a><br>
      ${vehicleLink ? `<a href="${vehicleLink}">Vehicle</a><br>` : ""}
      <span>Simulated Location</span>
    `))
    .addTo(map);
  btMarkers.push(m);
}

// initialise
(async () => {
  await getTripVehicle();
  const bounds = new maplibregl.LngLatBounds();
  await addRoutePolyline(tripVehicleId, bounds); // uses trip_route
  if (!bounds.isEmpty()) map.fitBounds(bounds, { padding: 60 });
  await loadTripVehicleMarker();
})();

// refresh vehicle marker every 30s
setInterval(loadTripVehicleMarker, 30000);
</script>



{% endblock %}
