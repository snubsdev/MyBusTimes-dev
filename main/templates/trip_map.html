{% extends 'mbtbase.html' %}
{% load static %}
{% load url_filters %}

{% block title %}{{ route.route_num }} Route Map{% endblock %}
{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />

<style>
  html, body, main {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  #directionToggle {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<button id="directionToggle" style="display: none;">
  {% if direction == "inbound" %}
    Show Outbound
  {% else %}
    Show Inbound
  {% endif %}
</button>

<div id="map"></div>

<script>
  const tripId = {{ trip.id }};
  const operatorName = "{{ operator.operator_name }}";

  // Choose tile style (dark/light theme)
  {% if themeDark == 'True' %}
    const tilesJSON = 'https://tiles.snubs.dev/styles/dark/style.json';
  {% else %}
    const tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';
  {% endif %}

  const map = new maplibregl.Map({
    container: 'map',
    style: tilesJSON,
    center: [-1.9, 54.9],
    zoom: 6
  });
  map.addControl(new maplibregl.NavigationControl(), 'top-left');

  let markers = [];
  const routeLayerId = 'routeLine';
  const trackingLayerId = 'trackingLine';

  async function loadTrip(tripId) {
    // Clear markers
    for (const m of markers) m.remove();
    markers = [];

    // Remove previous route line
    if (map.getLayer(routeLayerId)) map.removeLayer(routeLayerId);
    if (map.getSource(routeLayerId)) map.removeSource(routeLayerId);

    // Fetch trip data
    const res = await fetch(`/api/trips/${tripId}/`);
    if (!res.ok) {
      alert('Failed to load trip data');
      return;
    }

    const tripData = await res.json();
    const routeId = tripData.route_id;
    const direction = tripData.direction || 'inbound';

    // Fetch route geometry using routeId
    const routeRes = await fetch(`/api/routes/${routeId}/stops/?direction=${direction}`);
    if (!routeRes.ok) {
      alert('Failed to load route stops');
      return;
    }

    const data = await routeRes.json();
    const hasSnapped = data.has_snapped_route === true;
    const stops = data.stops || [];
    const snapped = data.snapped_route || [];

    const stopCoords = stops
      .map(stop => stop.cords?.split(',').map(Number))
      .filter(c => c && c.length === 2 && !isNaN(c[0]) && !isNaN(c[1]))
      .map(([lat, lon]) => [lon, lat]);

    let geometryToDraw = hasSnapped && snapped.length > 1 ? snapped : stopCoords;

    if (geometryToDraw.length >= 2) {
      map.addSource(routeLayerId, {
        type: 'geojson',
        data: {
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: geometryToDraw }
        }
      });

      map.addLayer({
        id: routeLayerId,
        type: 'line',
        source: routeLayerId,
        paint: { 'line-color': '#2f80ed', 'line-width': 3 }
      });

      const bounds = new maplibregl.LngLatBounds();
      geometryToDraw.forEach(c => bounds.extend(c));
      map.fitBounds(bounds, { padding: 60 });
    }

    // Add stop markers
    for (const stop of stops) {
      const [lat, lon] = stop.cords.split(',').map(Number);
      if (isNaN(lat) || isNaN(lon)) continue;

      const el = document.createElement('div');
      el.style.cssText = `
        width:10px;height:10px;
        border:3px solid #2f80ea;
        border-radius:50%;
        background:#fff;
        cursor:pointer;
      `;

      const marker = new maplibregl.Marker({ element: el })
        .setLngLat([lon, lat])
        .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(
          `<a href="/stop/?name=${encodeURIComponent(stop.stop)}">${stop.stop}</a>`
        ))
        .addTo(map);

      markers.push(marker);
    }

    // Plot tracking overlay if present
    const trackingPoints = tripData.tracking_points || [];
    if (trackingPoints.length) {
      const coords = trackingPoints.map(p => [p.X, p.Y]);

      if (map.getLayer(trackingLayerId)) map.removeLayer(trackingLayerId);
      if (map.getSource(trackingLayerId)) map.removeSource(trackingLayerId);

      map.addSource(trackingLayerId, {
        type: 'geojson',
        data: {
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: coords }
        }
      });

      map.addLayer({
        id: trackingLayerId,
        type: 'line',
        source: trackingLayerId,
        paint: {
          'line-color': 'black',
          'line-width': 3,
          'line-dasharray': [4, 7]
        }
      });

      // Add bus icon at last point
      const last = coords[coords.length - 1];
      if (last) {
        const heading = trackingPoints[trackingPoints.length - 1].heading || 0;
        const el = document.createElement('img');
        el.src = '{% static "icons/bus-arrow.svg" %}';
        el.style.width = '32px';
        el.style.height = '32px';
        el.style.transform = `rotate(${heading}deg)`;

        new maplibregl.Marker({ element: el })
          .setLngLat(last)
          .addTo(map);
      }
    }
  }

  // Initial load
  map.on('load', () => loadTrip(tripId));
</script>

{% endblock %}
