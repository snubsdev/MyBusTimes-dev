{% extends 'mbtbase.html' %}
{% load static %}
{% load url_filters %}

{% block title %}{{ route.route_num }} Route Map{% endblock %}
{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />

<style>
  html, body, main {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  #directionToggle {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<button id="directionToggle" style="display: none;">
  {% if direction == "inbound" %}
    Show Outbound
  {% else %}
    Show Inbound
  {% endif %}
</button>

<div id="map"></div>

<script>
const tripId = "{{ trip.trip_id }}";
const operatorId = "{{ operator.id }}";
let currentDirection = "inbound";
let showStops = false;
let tripRouteId = null;

{% if themeDark == 'True' %}
  const tilesJSON = 'https://tiles.snubs.dev/styles/dark/style.json';
{% else %}
  const tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';
{% endif %}

const map = new maplibregl.Map({
  container: 'map',
  style: tilesJSON,
  center: [-1.9, 54.9],
  zoom: 7
});
map.addControl(new maplibregl.NavigationControl(), 'top-left');

let stopMarkers = [];
let btMarkers = [];

// fetch trip → get route ID
async function getTripInfo() {
  const res = await fetch(`/api/trips/${tripId}/`);
  if (!res.ok) return;
  const tripData = await res.json();
  console.log("Trip data:", tripData);
  tripRouteId = tripData.trip_route;
  currentDirection = tripData.direction || currentDirection;
}

// draw route polyline + stops
async function drawRoute(routeId) {
  const res = await fetch(`/api/routes/${routeId}/stops/?direction=${currentDirection}`);
  if (!res.ok) return;
  const data = await res.json();
  const hasSnapped = data.has_snapped_route === true;
  const stops = data.stops || [];
  const snapped = data.snapped_route || [];

  const stopCoords = stops
    .map(s => s.cords?.split(',').map(Number))
    .filter(c => c && c.length === 2 && !isNaN(c[0]) && !isNaN(c[1]))
    .map(([lat, lon]) => [lon, lat]);

  const coords = hasSnapped && snapped.length > 1 ? snapped : stopCoords;

  if (map.getLayer('routeLine')) map.removeLayer('routeLine');
  if (map.getSource('routeLine')) map.removeSource('routeLine');

  if (coords.length >= 2) {
    map.addSource('routeLine', {
      type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } }
    });
    map.addLayer({
      id: 'routeLine',
      type: 'line',
      source: 'routeLine',
      paint: { 'line-color': '#2f80ed', 'line-width': 3 }
    });
    const bounds = new maplibregl.LngLatBounds();
    coords.forEach(c => bounds.extend(c));
    map.fitBounds(bounds, { padding: 60 });
  }

  // stops toggle
  stopMarkers.forEach(m => m.remove());
  stopMarkers = [];
  if (showStops) {
    for (const stop of stops) {
      const [lat, lon] = stop.cords.split(',').map(Number);
      if (isNaN(lat) || isNaN(lon)) continue;
      const el = document.createElement('div');
      el.style.cssText = "width:10px;height:10px;border:3px solid #2f80ea;border-radius:50%;background:#fff;";
      const m = new maplibregl.Marker({ element: el })
        .setLngLat([lon, lat])
        .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`<a href="/stop/?name=${encodeURIComponent(stop.stop)}">${stop.stop}</a>`))
        .addTo(map);
      stopMarkers.push(m);
    }
  }
}

// show only the vehicle for this trip
async function loadTripVehicleMarker() {
  const b = map.getBounds();
  const q = new URLSearchParams({
    ymax: b.getNorth(), ymin: b.getSouth(),
    xmax: b.getEast(), xmin: b.getWest(),
    operator_id: operatorId
  });
  const url = `/api/trips/estimated_positions/?${q}&limit=5000`;
  const res = await fetch(url);
  const data = await res.json();
  const vehicles = Array.isArray(data.results) ? data.results : [];

  btMarkers.forEach(m => m.remove());
  btMarkers = [];

  // match by trip_id
  const v = vehicles.find(v => v.trip_id === parseInt(tripId));
  if (!v) return;

  const lat = v.lat, lng = v.lng;
  if (!lat || !lng) return;

  const el = document.createElement('div');
  el.style.cssText = `
    display:flex;align-items:center;justify-content:center;
    width:32px;height:32px;
    background:${v.vehicle.colour || '#2f80ed'};
    border-radius:50%;
    border:2px solid #fff;
    color:${v.vehicle.text_colour || (v.vehicle.white_text ? '#fff' : '#000')};
    font-size:10px;font-weight:bold;
  `;
  el.innerText = v.service?.line_name || v.vehicle.name || "?";

  const m = new maplibregl.Marker({ element: el })
    .setLngLat([lng, lat])
    .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`
      <strong>${v.vehicle.name}</strong><br>
      ${v.service?.line_name || ""} ${v.destination ? "to " + v.destination : ""}<br>
      ${v.vehicle.url ? `<a href="${v.vehicle.url}">Vehicle page</a><br>` : ""}
      <span>Simulated Location</span>
    `))
    .addTo(map);

  btMarkers.push(m);
}

// initialise
map.on('load', async () => {
  await getTripInfo();
  if (tripRouteId) await drawRoute(tripRouteId);
  await loadTripVehicleMarker();
});

// refresh vehicle marker every 30s
setInterval(loadTripVehicleMarker, 30000);

// toggle buttons
document.getElementById("directionToggle").addEventListener("click", async () => {
  currentDirection = currentDirection === "inbound" ? "outbound" : "inbound";
  document.getElementById("directionToggle").innerText =
    currentDirection === "inbound" ? "Show Outbound" : "Show Inbound";
  if (tripRouteId) await drawRoute(tripRouteId);
});
document.getElementById("stopsToggle").addEventListener("click", async () => {
  showStops = !showStops;
  document.getElementById("stopsToggle").innerText = showStops ? "Hide Stops" : "Show Stops";
  if (tripRouteId) await drawRoute(tripRouteId);
});
</script>
{% endblock %}
