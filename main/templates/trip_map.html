{% extends 'mbtbase.html' %}
{% load static %}
{% load url_filters %}

{% block title %}{{ route.route_num }} Route Map{% endblock %}

{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  html, body, main {
    height: 100%;
    margin: 0;
    padding: 0;
  }
  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }
  .vehicle-marker {
    text-align: center;
    color: #000;
    fill: currentColor;
    text-anchor: middle;
    paint-order: stroke;
    stroke-width: 2px;
    line-height: 16px;
    z-index: 20;
  }
  .maplibregl-popup-tip,
  .maplibregl-popup-content {
    background: var(--background-color) !important;
    color: var(--text-color) !important;
    border-radius: 0.5em !important;
    font-size: 12px !important;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<div id="map"></div>

<script>
const tripId = "{{ trip.trip_id }}";
let currentDirection = "inbound";
let tripRouteId = null;

{% if themeDark == 'True' %}
  const tilesJSON = 'https://tiles.snubs.dev/styles/dark/style.json';
{% else %}
  const tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';
{% endif %}

const map = new maplibregl.Map({
  container: 'map',
  style: tilesJSON,
  center: [-1.9, 54.9],
  zoom: 8
});
map.addControl(new maplibregl.NavigationControl(), 'top-left');

let stopMarkers = [];
let btMarkers = [];

// fetch trip → get route ID
async function getTripInfo() {
  const res = await fetch(`/api/trips/${tripId}/`);
  if (!res.ok) return;
  const tripData = await res.json();
  tripRouteId = tripData.trip_route;
  currentDirection = tripData.direction || currentDirection;
}

// draw route polyline + stops
async function drawRoute(routeId) {
  const res = await fetch(`/api/routes/${routeId}/stops/?direction=${currentDirection}`);
  if (!res.ok) return;
  const data = await res.json();
  const coords = (data.snapped_route && data.snapped_route.length > 1)
    ? data.snapped_route
    : (data.stops || []).map(s => {
        const [lat, lon] = s.cords.split(',').map(Number);
        return [lon, lat];
      });

  if (map.getLayer('routeLine')) map.removeLayer('routeLine');
  if (map.getSource('routeLine')) map.removeSource('routeLine');

  if (coords.length >= 2) {
    map.addSource('routeLine', {
      type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } }
    });
    map.addLayer({
      id: 'routeLine',
      type: 'line',
      source: 'routeLine',
      paint: { 'line-color': '#2f80ed', 'line-width': 3 }
    });
    const bounds = new maplibregl.LngLatBounds();
    coords.forEach(c => bounds.extend(c));
    map.fitBounds(bounds, { padding: 60 });
  }

  // always show stops
  stopMarkers.forEach(m => m.remove());
  stopMarkers = [];
  if (data.stops) {
    for (const stop of data.stops) {
      const [lat, lon] = stop.cords.split(',').map(Number);
      const el = document.createElement('div');
      el.style.cssText = "width:10px;height:10px;border:3px solid #2f80ea;border-radius:50%;background:#fff;";
      const m = new maplibregl.Marker({ element: el })
        .setLngLat([lon, lat])
        .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(
          `<a href="/stop/?name=${encodeURIComponent(stop.stop)}">${stop.stop}</a>`))
        .addTo(map);
      stopMarkers.push(m);
    }
  }
}

// livery icon builder
function createLiveryIcon({ label = '', rotation = 0, css = null, textColour = '#000', textStroke = "#000", strokeWidth = "0px" } = {}) {
  const html = document.createElement('div');
  html.innerHTML = `
    <div style="display:inline-block; transform: rotate(${rotation}deg);">
      <svg width="24" height="16" class="vehicle-marker"
           style="stroke:${textStroke}; ${css ? `background:${css};` : 'background:#2f80ed;'} border:1px solid rgba(0,0,0);
                  color:${textColour}; fill:${textColour}; stroke-width:${strokeWidth};">
        <text x="12" y="12">${label}</text>
      </svg>
    </div>`;
  return html;
}

// show only the trip’s vehicle marker
async function loadTripVehicleMarker() {
  // fetch all positions for operator
  const url = `/api/trips/estimated_positions/?operator_id={{ operator.id }}&limit=5000`;
  const res = await fetch(url);
  const data = await res.json();
  const vehicles = Array.isArray(data.results) ? data.results : [];

  btMarkers.forEach(m => m.remove());
  btMarkers = [];

  // look through results for this tripId
  const v = vehicles.find(v => v.trip_id == tripId);
  console.log("Trip vehicle:", v);
  if (!v) return;

  if (!v.lat || !v.lng) return;

  let heading = (v.heading ?? 0) + 180;
  const line = v.service?.line_name || '';
  const dest = v.destination || '';
  const serviceLink = v.service?.url || '';
  const vehicleLink = v.vehicle?.url || '';
  const vehicleName = v.vehicle?.name || '';

  const css = v.vehicle?.css || v.vehicle?.left_css || v.vehicle?.right_css || "#2f80ed";
  const textColour = v.vehicle?.text_colour || (v.vehicle?.white_text ? "#fff" : "#000");
  const textStroke = v.vehicle?.stroke_colour || "#000";
  const strokeWidth = v.vehicle?.stroke_colour ? "2px" : "0px";

  const el = createLiveryIcon({
    label: line || vehicleName,
    css,
    textColour,
    rotation: heading + 90,
    textStroke,
    strokeWidth
  });

  const m = new maplibregl.Marker({ element: el })
    .setLngLat([v.lng, v.lat])
    .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`
      <strong>${vehicleName}</strong><br>
      ${line} ${dest ? "to " + dest : ""}<br>
      ${vehicleLink ? `<a href="${vehicleLink}">Vehicle page</a><br>` : ""}
      <span>Simulated Location</span>
    `))
    .addTo(map);

  btMarkers.push(m);
}

// initialise
map.on('load', async () => {
  await getTripInfo();
  if (tripRouteId) await drawRoute(tripRouteId);
  await loadTripVehicleMarker();
});

// refresh vehicle marker every 30s
setInterval(loadTripVehicleMarker, 30000);
</script>
{% endblock %}
