{% extends 'mbtbase.html' %}
{% load static %}

{% block title %}Live Route Map{% endblock %}

{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  html,
  body,
  main {
    overflow: hidden;
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  .maplibregl-popup-content {
    font-size: 14px;
    color: black;
  }

  .vehicle-marker {
    text-align: center;
    color: #000;
    fill: currentColor;
    text-anchor: middle;
    paint-order: stroke;
    stroke-width: 2px;
    line-height: 16px;
    z-index: 20;
  }

  .bt-toggle-control {
    background: var(--background-color);
    padding: 6px 8px;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    color: var(--text-color);
    position: absolute;
    top: 65px;
    right: 10px;
    z-index: 10;
  }

  .maplibregl-popup-tip,
  .maplibregl-popup-content {
    background: var(--background-color) !important;
    color: var(--text-color) !important;
    border-radius: 0.5em !important;
    font-size: 12px !important;
  }

  .stop-marker {
    z-index: 0; /* ✅ below vehicle markers */
  }


  small, p {
    margin: 0;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<div id="map"></div>
<div id="timer" style="display:none"></div>

<script>
  const savedView = JSON.parse(localStorage.getItem('mbt_map_view') || 'null');
  let tilesJSON = 'https://tiles.snubs.dev/styles/positron/style.json';

  {% if themeDark == 'True' %}
    tilesJSON = 'https://tiles.snubs.dev/styles/dark-matter/style.json';
  {% else %}
    tilesJSON = 'https://tiles.snubs.dev/styles/positron/style.json';
  {% endif %}

  const map = new maplibregl.Map({
    container: 'map',
    style: tilesJSON,
    center: savedView?.center || [-1.9, 54.9],
    zoom: savedView?.zoom || 5                
  });

  // Save user view on move
  map.on('moveend', () => {
    const center = map.getCenter();
    const zoom = map.getZoom();
    localStorage.setItem(
      'mbt_map_view',
      JSON.stringify({ center: [center.lng, center.lat], zoom })
    );
  });

  const vehicleMarkers = [];
  const stopMarkers = [];
  const btMarkers = [];

  function clearMarkers(list) {
    while (list.length) {
      const m = list.pop();
      m.remove();
    }
  }

  async function fetchStops() {
    const b = map.getBounds();
    const query = new URLSearchParams({
      ymax: b.getNorth(),
      ymin: b.getSouth(),
      xmax: b.getEast(),
      xmin: b.getWest()
    }).toString();

    try {
      const res = await fetch(`https://stops.mybustimes.cc/api/no-lim-stops?${query}`);
      const data = await res.json();
      const stops = Array.isArray(data) ? data : (data.features || []);
      clearMarkers(stopMarkers);

      for (const s of stops) {
        const lat = s.lat;
        const lng = s.lon;
        const name = s.properties?.name || s.name || `Stop ${lat.toFixed(4)},${lng.toFixed(4)}`;

        const el = document.createElement('div');
        el.className = 'stop-marker';
        el.style.cssText = 'width:10px;height:10px;border:3px solid #2f80ea;border-radius:50%;background:#fff;';
        const m = new maplibregl.Marker({ element: el })  // ✅ FIXED
          .setLngLat([lng, lat])
          .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`<a href="/stop/?name=${encodeURIComponent(name)}">${name}</a>`))
          .addTo(map);
        stopMarkers.push(m);
      }
    } catch (e) {
      console.error('Stop fetch failed', e);
    }
  }

  const btDiv = document.createElement('div');
  btDiv.className = 'bt-toggle-control';
  btDiv.innerHTML = `<label><input id="btToggle" type="checkbox" checked style="margin-right:6px;">Real Buses</label>`;
  document.body.appendChild(btDiv);
  const btToggle = document.getElementById('btToggle');
  btToggle.addEventListener('change', () => {
    if (btToggle.checked) fetchBTVehicles();
    else clearMarkers(btMarkers);
  });

  (async () => {
    await fetchStops();          // Stops first
  })();

  map.on('moveend', async () => {
    await fetchStops();          // stops → below
  });
</script>
{% endblock %}
