{% extends 'mbtbase.html' %}
{% load static %}
{% load url_filters %}

{% block title %}{{ route.route_num }} Route Map{% endblock %}

{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />

<style>
  html, body, main {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  #directionToggle {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  #stopsToggle {
    position: fixed;
    bottom: 50px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  /* Hide markers by default */

</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<button id="directionToggle">Show Outbound</button>
<button id="stopsToggle" style="
  position: fixed;
  bottom: 10px;
  left: 140px;
  z-index: 1000;
  background: var(--brand-color);
  color: var(--text-color);
  padding: 6px 10px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
">
  Show Stops
</button>

<div id="map"></div>

<script>
  const operatorId = "{{ operator.id }}";
  const operatorRoutesUrl = `/api/operator/route/?route_operators=${operatorId}&stops_have_cords=true`;

  let currentDirection = "inbound";
  let showStops = false;

  {% if themeDark == 'True' %}
    tilesJSON = 'https://tiles.snubs.dev/styles/dark/style.json';
  {% else %}
    tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';
  {% endif %}

  const map = new maplibregl.Map({
    container: 'map',
    style: tilesJSON,
    center: [-1.9, 54.9],
    zoom: 6
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-left');

  let markers = [];        // stop markers
  let routeLayers = [];    // route polylines
  let vehicleMarkers = {}; // real vehicles
  let btMarkers = [];      // BT simulated
  let btEnabled = true;

  /* =============================
      SAME ICON MAKER AS MAIN MAP
  ============================== */
  function createLiveryIcon({ label = '', rotation = 0, bg = '#0000', css = null, textColour = '#fff', textStroke = "#0000", strokeWidth = "0px" } = {}) {
    const normalisedRotation = ((rotation % 360) + 360) % 360;
    const cellRotation = (normalisedRotation < 90 || normalisedRotation > 270) ? 0 : 180;
    const backgroundStyle = css ? `background:${css};` : `background:${bg};`;

    const html = document.createElement('div');
    html.innerHTML = `
      <div style="display:inline-block; transform:rotate(${rotation}deg);">
        <svg width="24" height="16" class="vehicle-marker"
          style="stroke:${textStroke}; ${backgroundStyle} transform:rotate(${cellRotation}deg);
                 border:1px solid rgba(0,0,0); color:${textColour}; fill:${textColour};
                 stroke-width:${strokeWidth};">
          <text x="12" y="12">${label}</text>
        </svg>
        <span style="display:flex; margin-top:-27px; margin-left:16px; color:black;">
          <svg width="24" height="24" viewBox="0 0 24 24">
            <path d="M8 6.65v10.69c0 .64.76.99 1.24.56l6.11-5.35c.34-.3.34-.83 0-1.13L9.24 6.07C8.76 5.65 8 5.99 8 6.63Z"/>
          </svg>
        </span>
      </div>`;
    return html;
  }

  /* =============================
       REAL VEHICLES (MATCHES MAIN MAP)
  ============================== */
  async function refreshMarkers() {
    try {
      const res = await fetch('/api/active_trips/');
      const data = await res.json();
      const vehicles = data.results || [];

      const stillPresent = new Set();

      for (const v of vehicles) {
        const tr = v.tracking_data || v.tracking || {};
        const lat = tr.X ?? tr.lat ?? tr.latitude;
        const lng = tr.Y ?? tr.lon ?? tr.longitude;
        if (!lat || !lng) continue;

        const id = v.id || v.tracking_vehicle?.id;
        if (!id) continue;

        stillPresent.add(id);

        const heading = tr.heading ?? tr.bearing ?? 0;
        const routeNum = v.tracking_route?.route_num || v.route || '?';

        const veh = v.tracking_vehicle || {};
        const css = veh.livery?.left_css || veh.livery?.css || veh.livery?.colour || null;
        const textColour = veh.livery?.text_colour || '#000';

        if (vehicleMarkers[id]) {
          // smooth interpolation
          const marker = vehicleMarkers[id];
          const oldPos = marker.getLngLat();
          const newPos = [lng, lat];
          const startTime = performance.now();
          const duration = 500;

          const animate = (time) => {
            const t = Math.min(1, (time - startTime) / duration);
            const lngInterp = oldPos.lng + (newPos[0] - oldPos.lng) * t;
            const latInterp = oldPos.lat + (newPos[1] - oldPos.lat) * t;
            marker.setLngLat([lngInterp, latInterp]);
            if (t < 1) requestAnimationFrame(animate);
          };
          requestAnimationFrame(animate);

          marker.getElement().querySelector('svg').style.transform = `rotate(${heading}deg)`;
        } else {
          const el = createLiveryIcon({
            label: String(routeNum),
            css,
            textColour,
            rotation: heading
          });

          vehicleMarkers[id] = new maplibregl.Marker({ element: el })
            .setLngLat([lng, lat])
            .addTo(map);
        }
      }

      // cleanup
      for (const id in vehicleMarkers) {
        if (!stillPresent.has(Number(id))) {
          vehicleMarkers[id].remove();
          delete vehicleMarkers[id];
        }
      }

    } catch (e) {
      console.error("vehicle refresh failed", e);
    }
  }

  /* =============================
       BT VEHICLES (MATCHES MAIN MAP)
  ============================== */
  async function fetchBTVehicles() {
    const b = map.getBounds();
    const q = new URLSearchParams({
      ymax: b.getNorth(),
      ymin: b.getSouth(),
      xmax: b.getEast(),
      xmin: b.getWest()
    }).toString();

    try {
      const res = await fetch(`/api/trips/estimated_positions/?${q}`);
      const data = await res.json();

      let vehicles = Array.isArray(data.results) ? data.results : (data.features || []);
      clearBTMarkers();

      if (vehicles.length > 2000) return;

      for (const v of vehicles.slice(0, 2000)) {
        const lng = v.lng;
        const lat = v.lat;

        let heading = v.heading ?? 0;

        // flip like main map
        heading = heading + 180;
        const rotation = heading;
        heading = heading + 90;

        const line = v.service?.line_name || '';
        const dest = v.destination || '';
        const serviceLink = v.service?.url || '';
        const vehicleLink = v.vehicle?.url || '';
        const vehicleName = v.vehicle?.name || '';

        let css = v.vehicle?.left_css;
        if (rotation > 180 && rotation < 360) css = v.vehicle?.right_css;
        if (!css) css = v.vehicle?.css;

        let textColour = v.vehicle?.text_colour || (v.vehicle?.white_text ? '#fff' : '#000');
        let textStroke = v.vehicle?.stroke_colour ?? false;
        let strokeWidth = textStroke ? "2px" : "0px";

        const el = createLiveryIcon({
          label: line,
          css,
          textColour,
          rotation: heading,
          textStroke,
          strokeWidth
        });

        const popup = `
          <a href="${serviceLink}">${line} to ${dest}</a><br>
          ${vehicleName ? `<a href="${vehicleLink}">${vehicleName}</a><br>` : ''}
          <span>Simulated Location</span>
        `;

        const m = new maplibregl.Marker({ element: el })
          .setLngLat([lng, lat])
          .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(popup))
          .addTo(map);

        btMarkers.push(m);
      }
    } catch (e) {
      console.error("BT fetch failed", e);
    }
  }

  function clearBTMarkers() {
    btMarkers.forEach(m => m.remove());
    btMarkers = [];
  }

  /* =============================
        TICKERS
  ============================== */
  (async () => {
    await refreshMarkers();
    await fetchBTVehicles();
  })();

  map.on('moveend', async () => {
    await refreshMarkers();
    await fetchBTVehicles();
  });

  setInterval(async () => {
    await refreshMarkers();
    await fetchBTVehicles();
  }, 30000);
</script>

{% endblock %}
