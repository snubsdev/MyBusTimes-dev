{% extends 'mbtbase.html' %}
{% load static %}
{% load url_filters %}

{% block title %}{{ route.route_num }} Route Map{% endblock %}

{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />

<style>
  html, body, main {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  #directionToggle {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  #stopsToggle {
    position: fixed;
    bottom: 50px;
    left: 10px;
    z-index: 1000;
    background: var(--brand-color);
    color: var(--text-color);
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  .vehicle-marker {
    text-align: center;
    color: #000;
    fill: currentColor;
    text-anchor: middle;
    paint-order: stroke;
    stroke-width: 2px;
    line-height: 16px;
    z-index: 20;
  }

  .maplibregl-popup-tip,
  .maplibregl-popup-content {
    background: var(--background-color) !important;
    color: var(--text-color) !important;
    border-radius: 0.5em !important;
    font-size: 12px !important;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<button id="directionToggle">Show Outbound</button>
<button id="stopsToggle" style="
  position: fixed;
  bottom: 10px;
  left: 140px;
  z-index: 1000;
  background: var(--brand-color);
  color: var(--text-color);
  padding: 6px 10px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
">
  Show Stops
</button>

<div id="map"></div>

<script>
const operatorId = "{{ operator.id }}";
let currentDirection = "inbound";
let showStops = false;

{% if themeDark == 'True' %}
  tilesJSON = 'https://tiles.snubs.dev/styles/dark/style.json';
{% else %}
  tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';
{% endif %}

const map = new maplibregl.Map({
  container: 'map',
  style: tilesJSON,
  center: [-1.9, 54.9],
  zoom: 8
});
map.addControl(new maplibregl.NavigationControl(), 'top-left');

const routeLayers = [];
let stopMarkers = [];
let btMarkers = [];

async function loadOperatorRoutes() {
  // remove polyline layers
  for (const id of routeLayers) {
    if (map.getLayer(id)) map.removeLayer(id);
    if (map.getSource(id)) map.removeSource(id);
  }
  routeLayers.length = 0;

  // remove stops
  stopMarkers.forEach(m => m.remove());
  stopMarkers = [];

  const routesRes = await fetch(`/api/operator/route/?route_operators=${operatorId}&stops_have_cords=true`);
  const routesData = await routesRes.json();
  const routes = routesData.results ?? [];

  const bounds = new maplibregl.LngLatBounds();

  for (const r of routes) {
    await addRoutePolyline(r.id, bounds);
  }

  if (!bounds.isEmpty()) {
    map.fitBounds(bounds, { padding: 60 });
  }
}

async function addRoutePolyline(routeId, bounds) {
  const res = await fetch(`/api/routes/${routeId}/stops/?direction=${currentDirection}`);
  if (!res.ok) return;

  const stops = await res.json();
  const coords = stops
    .map(s => s.cords?.split(',').map(Number))
    .filter(c => c && c.length === 2)
    .map(([lat, lon]) => [lon, lat]);

  const lid = `route_${routeId}`;

  if (coords.length >= 2) {
    map.addSource(lid, {
      type: 'geojson',
      data: {
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: coords }
      }
    });

    map.addLayer({
      id: lid,
      type: 'line',
      source: lid,
      paint: {
        'line-color': '#2f80ed',
        'line-width': 3
      }
    });

    routeLayers.push(lid);
    coords.forEach(c => bounds.extend(c));
  }

  if (showStops) {
    for (const stop of stops) {
      const [lat, lon] = stop.cords.split(',').map(Number);
      const el = document.createElement('div');
      el.style.cssText = `
        width:10px;height:10px;
        border:3px solid #2f80ea;
        border-radius:50%;
        background:#fff;
      `;
      const m = new maplibregl.Marker({ element: el })
        .setLngLat([lon, lat])
        .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(
          `<a href="/stop/?name=${encodeURIComponent(stop.stop)}">${stop.stop}</a>`
        ))
        .addTo(map);
      stopMarkers.push(m);
    }
  }
}

function createLiveryIcon({ label = '', rotation = 0, bg = '#0000', css = null, textColour = '#fff', textStroke = "#0000", strokeWidth = "0px" } = {}) {
    const normalisedRotation = ((rotation % 360) + 360) % 360;
    const cellRotation = (normalisedRotation < 90 || normalisedRotation > 270) ? 0 : 180;
    const backgroundStyle = css ? `background: ${css};` : `background: ${bg};`;
    const html = document.createElement('div');
    html.innerHTML = `
      <div style="display:inline-block; transform: rotate(${rotation}deg);">
        <svg width="24" height="16" data-vehicle-id="51623" class="vehicle-marker" style="stroke: ${textStroke}; text-align: center; ${backgroundStyle} transform: rotate(${cellRotation}deg); border: 1px solid rgba(0,0,0); color: ${textColour}; fill: ${textColour}; stroke-width: ${strokeWidth};">
          <text x="12" y="12">${label}</text>
        </svg>
        <span style="display:flex; margin-top: -27px; margin-left: 16px; color:black;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
            <path d="M8 6.65v10.69c0 .64.76.99 1.24.56l6.11-5.35c.34-.3.34-.83 0-1.13L9.24 6.07C8.76 5.65 8 5.99 8 6.63Z" />
          </svg>
        </span>
      </div>
    `;

    return html;
  }

async function loadOperatorBT() {
  const b = map.getBounds();

  const q = new URLSearchParams({
    ymax: b.getNorth(),
    ymin: b.getSouth(),
    xmax: b.getEast(),
    xmin: b.getWest(),
    operator_id: operatorId
  });

  const url = `/api/trips/estimated_positions/?${q}&limit=5000`;

  const res = await fetch(url);
  const data = await res.json();
  const vehicles = Array.isArray(data.results) ? data.results : [];

  btMarkers.forEach(m => m.remove());
  btMarkers = [];

  for (const v of vehicles) {
    const lat = v.lat;
    const lng = v.lng;
    if (!lat || !lng) continue;

    let heading = (v.heading ?? 0) + 180;
    const line = v.service?.line_name || "";
    const dest = v.destination || "";
    const serviceLink = v.service?.url || "";
    const vehicleLink = v.vehicle?.url || "";

    // livery logic (copied from your working page)
    const css = v.vehicle?.css || v.vehicle?.left_css || "#fff";
    const textColour = v.vehicle?.text_colour || (v.vehicle?.white_text ? "#fff" : "#000");
    const textStroke = v.vehicle?.stroke_colour ?? false;
    const strokeWidth = textStroke ? "2px" : "0px";
    heading = heading + 90;

    const el = createLiveryIcon({
      label: line,
      css,
      textColour,
      rotation: heading,
      textStroke,
      strokeWidth
    });

    const veh = v.vehicle || {};

      const m = new maplibregl.Marker({ element: el })
        .setLngLat([lng, lat])
        .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`
          <a href="${serviceLink}">${line} to ${dest}</a><br>
          ${vehicleLink ? `<a href="${vehicleLink}">${veh.fleet_number || ''} - ${veh.reg || ''}</a>` : ""}<br>
          <span>Simulated Location</span>
        `))
      .addTo(map);

    btMarkers.push(m);
  }
}


document.getElementById("directionToggle").addEventListener("click", async () => {
  currentDirection = currentDirection === "inbound" ? "outbound" : "inbound";
  document.getElementById("directionToggle").innerText =
    currentDirection === "inbound" ? "Show Outbound" : "Show Inbound";
  await loadOperatorRoutes();
  await loadOperatorBT();
});

document.getElementById("stopsToggle").addEventListener("click", async () => {
  showStops = !showStops;
  document.getElementById("stopsToggle").innerText = showStops ? "Hide Stops" : "Show Stops";
  await loadOperatorRoutes();
});


(async () => {
  await loadOperatorRoutes();
  await loadOperatorBT();
})();

map.on("moveend", loadOperatorBT);
setInterval(loadOperatorBT, 30000);
</script>


{% endblock %}
