<style>
    body {
        background: url('https://raw.githubusercontent.com/NextStopLabs/MBT-Media-Kit/refs/heads/main/MBT%20Poppy%20Theme%20Asset%20Pack/slice.svg')0% center / contain;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        height: 100vh;
        text-align: center;
        padding-top: 25vh;
        font-size: 2em;
    }

    h1 {
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }

    h2 {
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        font-size: 1em;
    }
</style>

<body>
    <h1>Please take a moment of silence</h1>
    <h2 id="countdown">2m</h2>

    <script>
        let start_time = "11:30";
        let end_time = "11:32";

        let countdownElement = document.getElementById("countdown");
        function updateCountdown() {
            let now = new Date();
            let start = new Date();
            let end = new Date();

            let [startHours, startMinutes] = start_time.split(":").map(Number);
            let [endHours, endMinutes] = end_time.split(":").map(Number);

            start.setHours(startHours, startMinutes, 0, 0);
            end.setHours(endHours, endMinutes, 0, 0);

            if (now < start) {
                countdownElement.innerText = "Silence has not started yet.";
                return;
            }

            if (now >= end) {
                countdownElement.innerText = "Silence period has ended.";
                return;
            }

            let remainingTime = Math.floor((end - now) / 1000);
            let minutes = Math.floor(remainingTime / 60);
            let seconds = remainingTime % 60;

            countdownElement.innerText = `${minutes}m, ${seconds}s`;
        }

        setInterval(updateCountdown, 1000);
    </script>
</body>
