<online>
    <style>
      online {
        display: block;
        max-width: 600px;
        margin: 1rem auto;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        overflow: hidden;
        text-align: center;
      }

      online strong {
        padding: 0.8rem;
        display: block;
      }

      online table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed; /* equal column widths */
      }

      online thead {
        background-color: var(--brand-color-darker);
      }

      online th,
      online td {
        padding: 0.8rem;
        text-align: center !important;
        border: 1px solid var(--border-color);
        width: 25%;
        word-wrap: break-word;
      }

      online tbody td span {
        font-weight: 600;
        color: var(--text-color);
      }

      /* alternating row for subtle contrast */
      online tbody tr:nth-child(even) {
        background-color: var(--brand-color-darker);
      }

      /* --- MOBILE VIEW --- */
      @media (max-width: 600px) {
        online table,
        online thead,
        online tbody,
        online th,
        online td,
        online tr {
          display: block;
          width: 100%;
        }

        online thead {
          display: none;
        }

        online tbody tr {
          display: flex;
          flex-direction: column;
          gap: 0.4rem;
          padding: 0.8rem 1rem;
          background-color: var(--brand-color-darker);
          border-bottom: 1px solid var(--border-color);
        }

        /* Each cell becomes a "label: value" pair */
        online tbody td {
          display: flex;
          justify-content: space-between;
          align-items: center;
          border: none;
          padding: 0.3rem 0 !important;
          background: none;
          text-align: left !important;
          max-width: calc(100% - 2rem);
          border-bottom: 1px solid var(--brand-color-darker-darker);
        }

        online tbody td::before {
          content: attr(data-label);
          font-weight: 600;
        }

        online tbody td span {
          text-align: right;
          font-weight: 600;
        }

        #website-user-goal, #discord-user-goal {
          text-align: center !important;
          display: block;
        }
      }
    </style>

<strong style="background: var(--border-color);"> Come say hi on the <a href="/forum/">forums</a> or join the MBT Official <a href="/a/discord/">Discord Server</a>!</strong>


    <table>
      <thead>
        <tr>
          <td>Online</td>
          <td>Total</td>
          <td>Discord Online</td>
          <td>Discord Total</td>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td data-label="Online"><span id="online-users">–</span></td>
          <td data-label="Total"><span id="total-users">–</span></td>
          <td data-label="Discord Online"><span id="discord-online">–</span></td>
          <td data-label="Discord Total"><span id="discord-total">–</span></td>
        </tr>
        <tr style="background: var(--background-color);">
          <td colspan="2" id="website-user-goal"></td>
          <td colspan="2" id="discord-user-goal"></td>
        </tr>
      </tbody>
    </table>

    <script>
      const onlineUsersEl = document.getElementById("online-users");
      const totalUsersEl = document.getElementById("total-users");
      const discordOnlineEl = document.getElementById("discord-online");
      const discordTotalEl = document.getElementById("discord-total");
      const websiteGoalEl = document.getElementById("website-user-goal");
      const discordGoalEl = document.getElementById("discord-user-goal");
      const discordgoal = 1000;
      const websitegoal = 3000;
    

      fetch("/api/online-members/", { method: "GET" })
        .then(response => {
          if (!response.ok) throw new Error("Network response was not ok");
          return response.json();
        })
        .then(data => { 
          const websitememberstogo = websitegoal - data.total_mbt_members
          const discordmemberstogo = discordgoal - data.total_discord_members          
          onlineUsersEl.textContent = data.online_mbt_members ?? "—";
          totalUsersEl.textContent = data.total_mbt_members ?? "—";
          discordOnlineEl.textContent = data.online_discord_members ?? "—";
          discordTotalEl.textContent = data.total_discord_members ?? "—";

          if (websitememberstogo < 0) {
            websiteGoalEl.textContent = `Website member goal reached! 🎉`
          } else {
            websiteGoalEl.textContent = `${websitememberstogo} Website members to go`
          }

          if (discordmemberstogo < 0) {
            discordGoalEl.textContent = `Discord member goal reached! 🎉`
          } else {
            discordGoalEl.textContent = `${discordmemberstogo} Discord members to go`
          }
        })
        .catch(error => console.error("Fetch error:", error));
    </script>
    <strong>At 3000 Website members and 1000 Discord members, you will be able to vote what colour to dye <a href="/u/Kai/">Kai's</a> hair</strong>
  </online>
