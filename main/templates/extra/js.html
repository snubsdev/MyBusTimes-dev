<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Menu toggle
    document.getElementById('menu-toggle').addEventListener('click', function () {
      const navMenu = document.getElementById('nav-menu');
      if (navMenu.style.display === 'none' || navMenu.style.display === '') {
        navMenu.style.display = 'block';
      } else {
        navMenu.style.display = 'none';
      }
    });

    // Theme selector
    document.getElementById('theme-selector').addEventListener('change', function () {
      const themeId = this.value;
      const darkMode = document.getElementById('dark-mode-toggle').checked;

      fetch("{% url 'set_theme' %}", {
          method: 'POST',
          headers: {
            'X-CSRFToken': '{{ csrf_token }}',
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: new URLSearchParams({
            theme_id: themeId,
            darkMode: darkMode
          }),
        })
        .then(response => response.json())
        .then(() => window.location.reload())
        .catch(err => alert(err.message));
    });


    document.getElementById('dark-mode-toggle').addEventListener('change', function () {
      const darkMode = this.checked;
      const themeId = document.getElementById('theme-selector').value;

      fetch("{% url 'set_theme' %}", {
          method: 'POST',
          headers: {
            'X-CSRFToken': '{{ csrf_token }}',
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: new URLSearchParams({
            theme_id: themeId,
            darkMode: darkMode
          }),
        })
        .then(response => response.json())
        .then(() => window.location.reload())
        .catch(err => alert(err.message));
    });


    // Unban timer
    const timerEl = document.getElementById("unban-timer");
    if (timerEl) {
      const unbanDateStr = timerEl.dataset.unban;
      const unbanDate = new Date(unbanDateStr);

      function updateCountdown() {
        const now = new Date();
        const diff = unbanDate - now;

        if (diff <= 0) {
          timerEl.textContent = "You are unbanned!";
          clearInterval(timer);
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        let text = "";
        if (days > 0) text += days + "d ";
        text += hours.toString().padStart(2, "0") + "h ";
        text += minutes.toString().padStart(2, "0") + "m ";
        text += seconds.toString().padStart(2, "0") + "s";

        timerEl.textContent = text;
      }

      updateCountdown();
      const timer = setInterval(updateCountdown, 1000);
    }

    // Banned words checker
    const apiUrl = "/api/check-string/";

    async function checkForBannedWords(value, field) {
      if (!value.trim()) {
        field.style.borderColor = '';
        return;
      }

      try {
        const formData = new URLSearchParams();
        formData.append('query', value);

        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': '{{ csrf_token }}'
          },
          body: formData.toString()
        });

        const data = await response.json();
        const bannedItems = data.results.filter(r => r.status === "banned");

        if (bannedItems.length > 0) {
          let newValue = value;
          bannedItems.forEach(item => {
            const badWord = item.word || item.match || item.value || item.query || Object.values(item).find(
              v => typeof v === 'string') || '';
            if (!badWord) return;
            const esc = badWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const rx = new RegExp('\\b' + esc + '\\b', 'gi');
            newValue = newValue.replace(rx, '');
          });
          newValue = newValue.replace(/\s{2,}/g, ' ').trim();
          field.value = newValue;
          field.style.border = "2px solid red";
          alert("Your input contained banned words which have been removed.");

          setTimeout(() => {
            field.style.borderColor = '';
          }, 3000);
        }
      } catch (error) {
        console.error("API check failed:", error);
        field.style.border = "2px solid red";
        field.title = "⚠️ Error checking text";
      }
    }

    const fields = document.querySelectorAll(
      'input[type="text"], textarea, input[type="search"], input[type="email"]');
    fields.forEach(field => {
      field.addEventListener('input', () => {
        clearTimeout(field._bannedCheckTimeout);
        field._bannedCheckTimeout = setTimeout(() => checkForBannedWords(field.value, field), 300);
      });
    });
  });
</script>
