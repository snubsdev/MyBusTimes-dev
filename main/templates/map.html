{% extends 'mbtbase.html' %}
{% load static %}

{% block title %}Live Route Map{% endblock %}

{% block extra_css %}
<link href="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  html,
  body,
  main {
    overflow: hidden;
    height: 100%;
    margin: 0;
    padding: 0;
  }

  #map {
    position: fixed !important;
    top: 55px;
    bottom: 0;
    width: 100%;
    left: 0;
  }

  .maplibregl-popup-content {
    font-size: 14px;
    color: black;
  }

  .vehicle-marker {
    text-align: center;
    color: #000;
    fill: currentColor;
    text-anchor: middle;
    paint-order: stroke;
    stroke-width: 2px;
    line-height: 16px;
    z-index: 20;
  }

  .bt-toggle-control {
    background: var(--background-color);
    padding: 6px 8px;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    color: var(--text-color);
    position: absolute;
    top: 65px;
    right: 10px;
    z-index: 10;
  }

  .maplibregl-popup-tip,
  .maplibregl-popup-content {
    background: var(--background-color) !important;
    color: var(--text-color) !important;
    border-radius: 0.5em !important;
    font-size: 12px !important;
  }

  .stop-marker {
    z-index: 0; /* ✅ below vehicle markers */
  }


  small, p {
    margin: 0;
  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.js"></script>
{% endblock %}

{% block content %}
<div id="map"></div>
<div id="timer" style="display:none"></div>

<script>
  const savedView = JSON.parse(localStorage.getItem('mbt_map_view') || 'null');
  let tilesJSON = 'https://tiles.snubs.dev/styles/light/style.json';

  
  {% if themeDark == 'True' %}
    const style = 'dark';
  {% else %}
    const style = 'light';
  {% endif %}


  tilesJSON = `https://tiles.snubs.dev/styles/${style}/style.json`;

  const map = new maplibregl.Map({
    container: 'map',
    style: tilesJSON,
    center: savedView?.center || [-2.5, 54.5],
    zoom: savedView?.zoom || 5,
    dragRotate: false
  });

  map.on('style.load', () => {
    map.setProjection({
      type: 'globe'
    });
  });

  // Save user view on move
  map.on('moveend', () => {
    const center = map.getCenter();
    const zoom = map.getZoom();
    localStorage.setItem(
      'mbt_map_view',
      JSON.stringify({ center: [center.lng, center.lat], zoom })
    );
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-left');

  function timeAgo(dateString) {
    if (!dateString) return '';
    const seconds = Math.floor((new Date() - new Date(dateString)) / 1000);
    if (seconds < 60) return `${seconds} sec${seconds !== 1 ? 's' : ''} ago`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes} min${minutes !== 1 ? 's' : ''} ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours} hr${hours !== 1 ? 's' : ''} ago`;
    const days = Math.floor(hours / 24);
    return `${days} day${days !== 1 ? 's' : ''} ago`;
  }

  function createLiveryIcon({ label = '', rotation = 0, bg = '#0000', css = null, textColour = '#fff', textStroke = "#0000", strokeWidth = "0px", carriages = 1 } = {}) {
    const normalisedRotation = ((rotation % 360) + 360) % 360;
    const cellRotation = (normalisedRotation < 90 || normalisedRotation > 270) ? 0 : 180;
    const backgroundStyle = css ? `background: ${css};` : `background: ${bg};`;
    const html = document.createElement('div');
    
    // Ensure carriages is at least 1
    const numCarriages = Math.min(16, Math.max(1, parseInt(carriages) || 1));
    
    // Build carriage SVGs - last carriage (front) has label, rest are empty
    let carriageSvgs = '';
    for (let i = 0; i < numCarriages; i++) {
      const isLastCarriage = i === numCarriages - 1;
      const carriageLabel = isLastCarriage ? label : '';
      carriageSvgs += `
        <svg width="24" height="16" class="vehicle-marker" style="stroke: ${textStroke}; text-align: center; ${backgroundStyle} transform: rotate(${cellRotation}deg); border: 1px solid rgba(0,0,0); color: ${textColour}; fill: ${textColour}; stroke-width: ${strokeWidth}; ${i > 0 ? 'margin-left: 3px;' : ''}">
          <text x="12" y="12">${carriageLabel}</text>
        </svg>
      `;
    }
    
    html.innerHTML = `
      <div style="display:inline-flex; transform: rotate(${rotation}deg); align-items: center;">
        ${carriageSvgs}
        <span style="display:flex; margin-left: -8px; color:black; ">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
            <path d="M8 6.65v10.69c0 .64.76.99 1.24.56l6.11-5.35c.34-.3.34-.83 0-1.13L9.24 6.07C8.76 5.65 8 5.99 8 6.63Z" />
          </svg>
        </span>
      </div>
    `;

    return html;
  }

  function createSimpleCircle({ colour = '#000', borderColour = '#000' } = {}) {
    const el = document.createElement('div');
    el.style.cssText = `width: 10px; height: 10px; background: ${colour}; border-radius: 50%;`;
    return el;
  }

  const vehicleMarkers = [];
  const stopMarkers = [];
  const btMarkers = [];
  let btVehicleData = []; // Store vehicle data to re-render on zoom change
  const DETAIL_ZOOM_THRESHOLD = 10; // Zoom level to switch between circle and full icon

  function clearMarkers(list) {
    while (list.length) {
      const m = list.pop();
      m.remove();
    }
  }

  async function refreshMarkers() {
    try {
      const res = await fetch('/api/active_trips/');
      const data = await res.json();
      const vehicles = data.results || data || [];

      // 1️⃣ Track open popup
      const openPopup = document.querySelector('.maplibregl-popup');
      const openVehicleId = openPopup?.__vehicleId || null;

      // 2️⃣ Loop through all vehicles
      for (const v of vehicles) {
        const tracking = v.tracking_data || v.tracking || {};
        const lat = tracking.X ?? tracking.lat ?? tracking.latitude;
        const lng = tracking.Y ?? tracking.lon ?? tracking.longitude;
        if (!lat || !lng) continue;

        const id = v.id || v.tracking_vehicle?.id;
        if (!id) continue;

        const heading = tracking.heading ?? tracking.bearing ?? 0;
        const routeNum = v.tracking_route?.route_num || v.route || '?';
        const veh = v.tracking_vehicle || {};
        const liveryCss = veh.livery?.left_css || veh.livery?.css || veh.livery?.colour || null;
        const textColour = veh.livery?.text_colour || '#000';

        // 3️⃣ Marker already exists? Just move and rotate it.
        if (vehicleMarkers[id]) {
          const marker = vehicleMarkers[id];
          const el = marker.getElement();

          // Smoothly interpolate the marker position
          const oldPos = marker.getLngLat();
          const newPos = [lng, lat];

          // Animate the movement
          const startTime = performance.now();
          const duration = 500; // half a second
          const animate = (time) => {
            const t = Math.min(1, (time - startTime) / duration);
            const lngInterp = oldPos.lng + (newPos[0] - oldPos.lng) * t;
            const latInterp = oldPos.lat + (newPos[1] - oldPos.lat) * t;
            marker.setLngLat([lngInterp, latInterp]);
            if (t < 1) requestAnimationFrame(animate);
          };
          requestAnimationFrame(animate);

          // Update rotation instantly
          el.querySelector('svg').style.transform = `rotate(${heading}deg)`;
        } else {
          // 4️⃣ Create marker if it doesn’t exist
          const el = createLiveryIcon({
            label: String(routeNum),
            bg: veh.livery?.colour || '#ccc',
            css: liveryCss,
            textColour,
            rotation: heading
          });

          const popup = new maplibregl.Popup({ offset: 8 });
          popup.setHTML(`
            <a href="/operator/${veh.operator}/route/${v.tracking_route?.id}/">${routeNum} to ${v.tracking_end_location || ''}</a>
            <br><a href="/operator/${veh.operator}/vehicles/${veh.id}/">${veh.fleet_number || ''} - ${veh.reg || ''}</a>
            <br><span class="time-ago" data-time="${v.tracking_updated_at}">${timeAgo(v.tracking_updated_at)}</span>
            <br>Heading: ${heading}°
          `);

          const marker = new maplibregl.Marker({ element: el })
            .setLngLat([lng, lat])
            .setPopup(popup)
            .addTo(map);

          popup.on('open', () => (popup.__vehicleId = id));
          vehicleMarkers[id] = marker;
        }
      }

      // 5️⃣ Reopen popup if vehicle still exists
      if (openVehicleId && vehicleMarkers[openVehicleId]) {
        const marker = vehicleMarkers[openVehicleId];
        const popup = marker.getPopup();
        if (popup && !popup.isOpen()) popup.addTo(map);
      }

    } catch (err) {
      console.error('Vehicle marker update failed', err);
    }
  }

  async function fetchStops() {
    const zoom = map.getZoom();
    if (zoom < 16) {
      clearMarkers(stopMarkers);
      return;
    }

    const b = map.getBounds();
    const query = new URLSearchParams({
      ymax: b.getNorth(),
      ymin: b.getSouth(),
      xmax: b.getEast(),
      xmin: b.getWest()
    }).toString();

    try {
      const res = await fetch(`https://stops.mybustimes.cc/api/stops?${query}`);
      const data = await res.json();
      const stops = Array.isArray(data) ? data : (data.features || []);
      clearMarkers(stopMarkers);

      for (const s of stops) {
        const lat = s.lat;
        const lng = s.lon;
        const name = s.properties?.name || s.name || `Stop ${lat.toFixed(4)},${lng.toFixed(4)}`;

        const el = document.createElement('div');
        el.className = 'stop-marker';
        el.style.cssText = 'width:10px;height:10px;border:3px solid var(--brand-color);border-radius:50%;background:#fff;';
        const m = new maplibregl.Marker({ element: el })  // ✅ FIXED
          .setLngLat([lng, lat])
          .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`<a href="/stop/?name=${encodeURIComponent(name)}">${name}</a>`))
          .addTo(map);
        stopMarkers.push(m);
      }
    } catch (e) {
      console.error('Stop fetch failed', e);
    }
  }

  async function fetchBTVehicles() {
    const b = map.getBounds();
    const q = new URLSearchParams({
      ymax: b.getNorth(),
      ymin: b.getSouth(),
      xmax: b.getEast(),
      xmin: b.getWest()
    }).toString();

    try {
      const res = await fetch(`/api/trips/simulated_positions/?${q}&limit=5000`);
      const data = await res.json();

      let vehicles = Array.isArray(data.results) ? data.results : (data.features || []);
      btVehicleData = vehicles; // Store for re-rendering on zoom
      clearMarkers(btMarkers);

      renderBTMarkers();
    } catch (e) {
      console.error('BT vehicle fetch failed', e);
    }
  }

  function renderBTMarkers() {
    clearMarkers(btMarkers);
    const zoom = map.getZoom();
    const showDetailedIcon = zoom >= DETAIL_ZOOM_THRESHOLD;

    for (const v of btVehicleData.slice(0, 5000)) {
      const lng = v.lng;
      const lat = v.lat;

      let heading = v.heading ?? 0;
      const line = v.service?.line_name || '';
      const serviceLink = v.service?.url || '';
      const vehicleLink = v.vehicle?.url || '';
      const dest = v.destination || '';
      const vehicleName = v.vehicle?.name || '';
      const vehicleColour = v.vehicle?.colour || '#000';
      const whiteText = v.vehicle?.white_text ?? false;
      let textStroke = v.vehicle?.stroke_colour ?? false;
      const livery = v.vehicle?.livery || null;

      heading = heading + 180;
      const rotation = heading;
      heading = heading + 90;

      const left_css = v.vehicle?.left_css || null;
      const right_css = v.vehicle?.right_css || null;

      let css = left_css;

      if (rotation > 180 && rotation < 360) {
        css = right_css;
      } else {
        css = left_css;
      }
      
      let textColour = '#000';

      if (whiteText) textColour = '#fff';

      if (v.vehicle?.text_colour) textColour = v.vehicle.text_colour;

      let strokeWidth = "0px";

      if (textStroke != false) strokeWidth = "2px";

      if (livery == null) {
        textColour = '#000';
        css = "#fff";
      }

      if (v.vehicle?.css) {
        css = v.vehicle.css;
      }

      // Parse custom_features for carriages
      let carriages = 1;
      const customFeatures = v.vehicle?.custom_features;
      if (customFeatures) {
        try {
          // Handle JSON object, JSON string, or Python-style string dict
          let features = customFeatures;
          if (typeof customFeatures === 'string') {
            // Replace single quotes with double quotes for Python-style dicts
            features = JSON.parse(customFeatures.replace(/'/g, '"'));
          }
          if (features && features.carriages) {
            carriages = parseInt(features.carriages) || 1;
          }
        } catch (e) {
          console.warn('Failed to parse custom_features:', customFeatures, e);
        }
      }

      let html = `
      <a href="${serviceLink}">${line} to ${dest}</a><br>
      ${vehicleName ? `<a href="${vehicleLink}">${vehicleName}</a>` : ''}<br>
        <span class="time-ago" data-time="${v.updated_at}">${timeAgo(v.updated_at)}</span>
        <small style="margin-bottom: 0;">Simulated Location</small>
      `;

      let el;
      if (showDetailedIcon) {
        // Only show multiple carriages when zoomed in past level 12
        const zoom = map.getZoom();
        const displayCarriages = zoom > 12 ? carriages : 1;

        el = createLiveryIcon({
          label: line, css, textColour, rotation: heading, textStroke, strokeWidth, carriages: displayCarriages
        });
      } else {
        // Simple circle when zoomed out - use vehicle colour
        el = createSimpleCircle({ colour: vehicleColour, borderColour: '#333' });
      }

      const m = new maplibregl.Marker({ element: el })
        .setLngLat([lng, lat])
        .setPopup(new maplibregl.Popup({ offset: 6 }).setHTML(`
          ${html}
        `))
        .addTo(map);
      btMarkers.push(m);
    }
  }

  const btDiv = document.createElement('div');
  btDiv.className = 'bt-toggle-control';
  btDiv.innerHTML = `<label><input id="btToggle" type="checkbox" checked style="margin-right:6px;">Real Buses</label>`;
  btDiv.style.zIndex = -10;
  document.body.appendChild(btDiv);
  const btToggle = document.getElementById('btToggle');
  btToggle.addEventListener('change', () => {
    if (btToggle.checked) fetchBTVehicles();
    else clearMarkers(btMarkers);
  });

  (async () => {
    await fetchStops();          // Stops first
    await refreshMarkers();      // Vehicles next (above)
    await fetchBTVehicles();     // BT vehicles last (top layer)
  })();

  setInterval(async () => {
    await fetchStops();          // stops → below
    await refreshMarkers();      // vehicles → above
    if (btToggle.checked) await fetchBTVehicles(); // bt vehicles → top
  }, 30000);

  map.on('moveend', async () => {
    await fetchStops();          // stops → below
    await refreshMarkers();      // vehicles → above
    if (btToggle.checked) await fetchBTVehicles(); // bt vehicles → top
  });

  // Re-render BT markers when zooming past the threshold (without re-fetching data)
  let lastZoomLevel = map.getZoom();
  map.on('zoom', () => {
    const currentZoom = map.getZoom();
    const crossedThreshold = 
      (lastZoomLevel < DETAIL_ZOOM_THRESHOLD && currentZoom >= DETAIL_ZOOM_THRESHOLD) ||
      (lastZoomLevel >= DETAIL_ZOOM_THRESHOLD && currentZoom < DETAIL_ZOOM_THRESHOLD);
    
    if (crossedThreshold && btToggle.checked && btVehicleData.length > 0) {
      renderBTMarkers();
    }
    lastZoomLevel = currentZoom;
  });

  setInterval(() => {
    document.querySelectorAll('.time-ago').forEach(el => {
      const dateString = el.dataset.time;
      if (dateString) {
        el.textContent = timeAgo(dateString);
      }
    });
  }, 1000); 
</script>
{% endblock %}
